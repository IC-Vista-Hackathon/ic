document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n\n\n\n\n\n\n\n\n\n\n<script src=\"47a95885-8639-481f-b56f-cc6f3a5342de\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <style>/* ==============================================================\n   InvoiceCloud Design System — token CSS\n   --------------------------------------------------------------\n   Source of truth: DESIGN.md at the root of the InvoiceCloud\n   UiDesignSystem repository (mirrored in _ref/DESIGN.md).\n   Every value below is copied directly from DESIGN.md or\n   src/styles/variables/_*.scss — no inventions, no overrides.\n\n   This file documents the **invoicecloud** (biller-facing) theme.\n   The full system has four peer themes (default / base / alternate /\n   invoicecloud) defined in src/styles/variables/. Only the biller\n   theme has a published DESIGN.md spec at this time.\n   ============================================================== */\n\n/* ---- Inter and Roboto Mono — bundled locally (matches upstream src/assets/fonts/) ---- */\n@font-face {\n    font-family: 'Inter';\n    font-style: normal;\n    font-weight: 100 900;\n    font-display: swap;\n    src: url(\"ba0fe17d-21e9-4dbf-9b82-34fce082feee\") format('woff2-variations');\n}\n@font-face {\n    font-family: 'Roboto Mono';\n    font-style: normal;\n    font-weight: 100 700;\n    font-display: swap;\n    src: url(\"1930d270-a9f6-43c3-98d5-a90e38a3d597\") format('woff2-variations');\n}\n\n:root {\n    /* ============================================================\n       Utility palette — the raw substrate every semantic token is\n       composed from. Five families × 10 steps. Neutral additionally\n       has -0 (white) and -100 (black) bookends.\n       Source: DESIGN.md > frontmatter > colors > utility-*\n       ============================================================ */\n\n    /* Neutral ramp */\n    --invoicecloud-utility-neutral-0:   #ffffff;\n    --invoicecloud-utility-neutral-05:  #f3f3f3;\n    --invoicecloud-utility-neutral-10:  #e8e8e8;\n    --invoicecloud-utility-neutral-20:  #d1d1d1;\n    --invoicecloud-utility-neutral-30:  #bababa;\n    --invoicecloud-utility-neutral-40:  #a3a3a3;\n    --invoicecloud-utility-neutral-50:  #8c8c8c;\n    --invoicecloud-utility-neutral-60:  #707070;\n    --invoicecloud-utility-neutral-70:  #545454;\n    --invoicecloud-utility-neutral-80:  #383838;\n    --invoicecloud-utility-neutral-90:  #1c1c1c;\n    --invoicecloud-utility-neutral-100: #000000;\n\n    /* Blue (info intent) */\n    --invoicecloud-utility-blue-05: #e9f1fb;\n    --invoicecloud-utility-blue-10: #d9e7f8;\n    --invoicecloud-utility-blue-20: #a5c0e1;\n    --invoicecloud-utility-blue-30: #79a0d1;\n    --invoicecloud-utility-blue-40: #4c81c2;\n    --invoicecloud-utility-blue-50: #1f61b3;\n    --invoicecloud-utility-blue-60: #194e8f;\n    --invoicecloud-utility-blue-70: #133a6b;\n    --invoicecloud-utility-blue-80: #0c2748;\n    --invoicecloud-utility-blue-90: #061324;\n\n    /* Green (success intent) */\n    --invoicecloud-utility-green-05: #f6fbf7;\n    --invoicecloud-utility-green-10: #dbf1de;\n    --invoicecloud-utility-green-20: #b8e3bd;\n    --invoicecloud-utility-green-30: #94d49b;\n    --invoicecloud-utility-green-40: #71c67a;\n    --invoicecloud-utility-green-50: #4db859;\n    --invoicecloud-utility-green-60: #3e9347;\n    --invoicecloud-utility-green-70: #2e6e35;\n    --invoicecloud-utility-green-80: #1f4a24;\n    --invoicecloud-utility-green-90: #0f2512;\n\n    /* Red (danger intent) */\n    --invoicecloud-utility-red-05: #fcf4f4;\n    --invoicecloud-utility-red-10: #f3d4d4;\n    --invoicecloud-utility-red-20: #e7a9a9;\n    --invoicecloud-utility-red-30: #dc7e7d;\n    --invoicecloud-utility-red-40: #d05352;\n    --invoicecloud-utility-red-50: #c42827;\n    --invoicecloud-utility-red-60: #9d201f;\n    --invoicecloud-utility-red-70: #761817;\n    --invoicecloud-utility-red-80: #4e1010;\n    --invoicecloud-utility-red-90: #270808;\n\n    /* Yellow (warning intent) */\n    --invoicecloud-utility-yellow-05: #fbf9e6;\n    --invoicecloud-utility-yellow-10: #f6f2c8;\n    --invoicecloud-utility-yellow-20: #f1ecac;\n    --invoicecloud-utility-yellow-30: #ede690;\n    --invoicecloud-utility-yellow-40: #e8df75;\n    --invoicecloud-utility-yellow-50: #e4d959;\n    --invoicecloud-utility-yellow-60: #beb54a;\n    --invoicecloud-utility-yellow-70: #98913b;\n    --invoicecloud-utility-yellow-80: #726c2c;\n    --invoicecloud-utility-yellow-90: #5b5724;\n\n    /* ============================================================\n       InvoiceCloud (biller) theme — primary teal + secondary cyan + slate\n       Source: DESIGN.md > Colors\n       ============================================================ */\n    --invoicecloud-primary:           #085368;\n    --invoicecloud-primary-shade:     #074156;\n    --invoicecloud-primary-tint:      #dffbfd;\n    --invoicecloud-primary-border:    #529caf;\n\n    --invoicecloud-secondary:         #18b4e9;\n    --invoicecloud-secondary-shade:   #1188b0;\n    --invoicecloud-secondary-tint:    #baedff;\n    --invoicecloud-secondary-border:  #8cd9f4;\n\n    /* Slate — cool gray-blue accents for SecondaryButton & some surfaces */\n    --invoicecloud-slate-05: #f7f8fa;\n    --invoicecloud-slate-10: #f1f3f6;\n    --invoicecloud-slate-20: #ecf0f4;\n\n    --invoicecloud-neutral: var(--invoicecloud-utility-neutral-90);\n\n    /* ============================================================\n       Surfaces — container-level color compositions for Card / Dialog /\n       Drawer. Five variants. `surface-strong` background is a gradient\n       (#f5f5f5 → #f7f0f8) which can't be expressed as a single hex.\n       Source: DESIGN.md > Colors > Surfaces\n       ============================================================ */\n    --invoicecloud-surface-default-background:  var(--invoicecloud-utility-neutral-0);\n    --invoicecloud-surface-default-border:      #e3e7ec;\n    --invoicecloud-surface-default-content:     var(--invoicecloud-utility-neutral-100);\n\n    --invoicecloud-surface-brand-primary-background:  var(--invoicecloud-primary);\n    --invoicecloud-surface-brand-primary-content:     var(--invoicecloud-utility-neutral-0);\n\n    --invoicecloud-surface-brand-secondary-background: var(--invoicecloud-secondary);\n    --invoicecloud-surface-brand-secondary-content:    var(--invoicecloud-utility-neutral-100);\n\n    --invoicecloud-surface-subtle-background:   var(--invoicecloud-primary-tint);\n    --invoicecloud-surface-subtle-content:      var(--invoicecloud-utility-neutral-100);\n\n    --invoicecloud-surface-strong-background:   linear-gradient(90deg, #f5f5f5, #f7f0f8);\n    --invoicecloud-surface-strong-border:       var(--invoicecloud-utility-neutral-20);\n    --invoicecloud-surface-strong-content:      var(--invoicecloud-utility-neutral-100);\n\n    /* ============================================================\n       Intent — info / success / warning / danger / neutral\n       Each carries color + hover + background + background-hover + border.\n       Source: DESIGN.md > Colors > Intent\n       ============================================================ */\n    --invoicecloud-intent-info:                #133a6b;\n    --invoicecloud-intent-info-hover:          #194e8f;\n    --invoicecloud-intent-info-background:     #d9e7f8;\n    --invoicecloud-intent-info-background-hover:#a5c0e1;\n    --invoicecloud-intent-info-border:         #79a0d1;\n\n    --invoicecloud-intent-success:             #1f4a24;\n    --invoicecloud-intent-success-hover:       #2e6e35;\n    --invoicecloud-intent-success-background:  #dbf1de;\n    --invoicecloud-intent-success-background-hover:#b8e3bd;\n    --invoicecloud-intent-success-border:      #b8e3bd;\n\n    --invoicecloud-intent-warning:             #5b5724;\n    --invoicecloud-intent-warning-hover:       #726c2c;\n    --invoicecloud-intent-warning-background:  #f6f2c8;\n    --invoicecloud-intent-warning-background-hover:#f1ecac;\n    --invoicecloud-intent-warning-border:      #ede690;\n\n    --invoicecloud-intent-danger:              #761817;\n    --invoicecloud-intent-danger-hover:        #9d201f;\n    --invoicecloud-intent-danger-background:   #f3d4d4;\n    --invoicecloud-intent-danger-background-hover:#e7a9a9;\n    --invoicecloud-intent-danger-border:       #e7a9a9;\n\n    --invoicecloud-intent-neutral:             #545454;\n    --invoicecloud-intent-neutral-hover:       #707070;\n    --invoicecloud-intent-neutral-background:  #f3f3f3;\n    --invoicecloud-intent-neutral-background-hover:#e8e8e8;\n    --invoicecloud-intent-neutral-border:      #d1d1d1;\n\n    /* ============================================================\n       Icon fills\n       ============================================================ */\n    --invoicecloud-icon-brand-fill:    var(--invoicecloud-primary);\n    --invoicecloud-icon-neutral-fill:  var(--invoicecloud-utility-neutral-100);\n\n    /* ============================================================\n       Typography — Inter (Roboto Mono for code), heading weight 500\n       Source: DESIGN.md > frontmatter > typography\n       ============================================================ */\n    --invoicecloud-font-family-primary: 'Inter', sans-serif;\n    --invoicecloud-font-family-heading: 'Inter', sans-serif;\n    --invoicecloud-font-family-mono:    'Roboto Mono', monospace;\n\n    --invoicecloud-h1-font-size:   32px;\n    --invoicecloud-h2-font-size:   24px;\n    --invoicecloud-h3-font-size:   20px;\n    --invoicecloud-h4-font-size:   18px;\n    --invoicecloud-h5-font-size:   16px;\n    --invoicecloud-h6-font-size:   12px;\n    --invoicecloud-h1-line-height: 1.2;\n    --invoicecloud-h2-line-height: 1.25;\n    --invoicecloud-h3-line-height: 1.3;\n    --invoicecloud-h4-line-height: 1.35;\n    --invoicecloud-h5-line-height: 1.4;\n    --invoicecloud-h6-line-height: 1.4;\n    --invoicecloud-heading-font-weight: 500;\n    --invoicecloud-heading-color: var(--invoicecloud-utility-neutral-100);\n\n    --invoicecloud-body-lg-font-size: 16px;\n    --invoicecloud-body-md-font-size: 14px;\n    --invoicecloud-body-sm-font-size: 14px;\n    --invoicecloud-body-xs-font-size: 12px;\n    --invoicecloud-body-line-height:  1.5;\n    --invoicecloud-body-color:        var(--invoicecloud-utility-neutral-100);\n\n    --invoicecloud-button-text-font-size:   16px;\n    --invoicecloud-button-text-font-weight: 700;\n\n    --invoicecloud-alert-text-font-size:   14px;\n    --invoicecloud-alert-text-line-height: 1.4;\n\n    --invoicecloud-code-font-size: 14px;\n\n    /* ============================================================\n       Spacing — 7 steps, multiples of 4 (skips 12 + 20)\n       ============================================================ */\n    --invoicecloud-spacing-xxs: 4px;\n    --invoicecloud-spacing-xs:  8px;\n    --invoicecloud-spacing-s:   16px;\n    --invoicecloud-spacing-m:   24px;\n    --invoicecloud-spacing-l:   32px;\n    --invoicecloud-spacing-xl:  40px;\n    --invoicecloud-spacing-xxl: 48px;\n\n    /* ============================================================\n       Rounded — three named steps\n       Card uses literal 14px (off-scale, between m=8 and l=32).\n       PrimaryButton uses literal 10px (off-scale).\n       Switch uses literal 12px (half its 24px height).\n       ============================================================ */\n    --invoicecloud-rounded-s: 4px;\n    --invoicecloud-rounded-m: 8px;\n    --invoicecloud-rounded-l: 32px;\n\n    /* ============================================================\n       Focus outline — system-wide, theme-independent\n       2.5px solid utility-blue-50 with 3px offset (offset-s),\n       4px (offset-m). Used by every focusable control.\n       ============================================================ */\n    --invoicecloud-focus-outline-color:    var(--invoicecloud-utility-blue-50);\n    --invoicecloud-focus-outline-width:    2.5px;\n    --invoicecloud-focus-outline-style:    solid;\n    --invoicecloud-focus-outline:          2.5px solid var(--invoicecloud-utility-blue-50);\n    --invoicecloud-focus-outline-offset-s: 3px;\n    --invoicecloud-focus-outline-offset-m: 4px;\n\n    /* ============================================================\n       Elevation\n       ============================================================ */\n    --invoicecloud-elevation-1: 0 4px 8px rgba(0,0,0,.10);\n    --invoicecloud-elevation-2: 0 2px 4px 0 rgba(28,28,28,.16);\n    --invoicecloud-elevation-3: 0 8px 24px rgba(0,0,0,.15);\n    --invoicecloud-card-shadow:        rgba(0,0,0,.1) 0px 1px 3px 0px, rgba(0,0,0,.1) 0px 1px 2px -1px;\n    --invoicecloud-card-hover-shadow:  rgba(0,0,0,.1) 0px 10px 15px -3px, rgba(0,0,0,.1) 0px 4px 6px -4px;\n    --invoicecloud-popover-shadow:     0px 16px 32px 0px rgba(28,28,28,.16);\n    --invoicecloud-toast-shadow:       0 8px 16px rgba(28,28,28,.16);\n    --invoicecloud-drawer-shadow:      -4px 0 24px rgba(0,0,0,.12);\n}\n\n/* ==============================================================\n   Element defaults (for prototyping — production uses <Heading>,\n   <Paragraph>, etc. which scope styles)\n   ============================================================== */\nhtml, body {\n    font-family: var(--invoicecloud-font-family-primary);\n    font-size: var(--invoicecloud-body-md-font-size);\n    line-height: var(--invoicecloud-body-line-height);\n    color: var(--invoicecloud-body-color);\n    background: var(--invoicecloud-utility-neutral-0);\n    -webkit-font-smoothing: antialiased;\n    text-rendering: optimizeLegibility;\n}\nh1, h2, h3, h4, h5, h6 {\n    font-family: var(--invoicecloud-font-family-heading);\n    font-weight: var(--invoicecloud-heading-font-weight);\n    color: var(--invoicecloud-heading-color);\n    margin: 0;\n}\nh1 { font-size: var(--invoicecloud-h1-font-size); line-height: var(--invoicecloud-h1-line-height); }\nh2 { font-size: var(--invoicecloud-h2-font-size); line-height: var(--invoicecloud-h2-line-height); }\nh3 { font-size: var(--invoicecloud-h3-font-size); line-height: var(--invoicecloud-h3-line-height); }\nh4 { font-size: var(--invoicecloud-h4-font-size); line-height: var(--invoicecloud-h4-line-height); }\nh5 { font-size: var(--invoicecloud-h5-font-size); line-height: var(--invoicecloud-h5-line-height); }\nh6 { font-size: var(--invoicecloud-h6-font-size); line-height: var(--invoicecloud-h6-line-height); }\np {\n    margin: 0;\n    font-size: var(--invoicecloud-body-lg-font-size);\n    line-height: var(--invoicecloud-body-line-height);\n    color: var(--invoicecloud-body-color);\n}\ncode, kbd, pre, samp {\n    font-family: var(--invoicecloud-font-family-mono);\n    font-size: var(--invoicecloud-code-font-size);\n}\n:focus-visible {\n    outline: var(--invoicecloud-focus-outline);\n    outline-offset: var(--invoicecloud-focus-outline-offset-s);\n}\n<\u002Fstyle>\n  <style>\n    @keyframes spin { to { transform: rotate(360deg); } }\n    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }\n    * { box-sizing: border-box; }\n    body { margin:0; }\n    input:focus, button:focus, textarea:focus { outline: var(--invoicecloud-focus-outline); outline-offset: var(--invoicecloud-focus-outline-offset-s); }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"font-family:var(--invoicecloud-font-family-primary);min-height:100vh;background:var(--invoicecloud-utility-neutral-05);color:var(--invoicecloud-utility-neutral-100);text-wrap:pretty\">\n\n  <!-- ================= LANDING ================= -->\n  <sc-if value=\"{{ screenIsLanding }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"display:flex;flex-direction:column;min-height:100vh\">\n      <header style=\"display:flex;align-items:center;justify-content:space-between;padding:var(--invoicecloud-spacing-m) var(--invoicecloud-spacing-l);background:var(--invoicecloud-primary)\">\n        <img src=\"be84f046-35c3-4c1e-8db8-6ce363b6bacd\" alt=\"InvoiceCloud\" style=\"height:24px;filter:brightness(0) invert(1)\">\n        <span style=\"color:#fff;font-size:14px;opacity:.85\">Payment Experience Builder<\u002Fspan>\n      <\u002Fheader>\n      <section style=\"background:var(--invoicecloud-primary);color:#fff;padding:96px var(--invoicecloud-spacing-l) 128px;text-align:center\">\n        <div style=\"font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--invoicecloud-secondary);margin-bottom:var(--invoicecloud-spacing-s)\">InvoiceCloud · Try It Out<\u002Fdiv>\n        <h1 style=\"font-size:48px;line-height:1.15;font-weight:500;max-width:760px;margin:0 auto var(--invoicecloud-spacing-m);color:#fff\">Build your own custom payment experience<\u002Fh1>\n        <p style=\"font-size:18px;max-width:560px;margin:0 auto var(--invoicecloud-spacing-l);color:rgba(255,255,255,.85)\">Answer a few questions about your business. We'll check payment compliance for your area, match your brand, and generate a live preview — in under a minute.<\u002Fp>\n        <button type=\"button\" sc-camel-on-click=\"{{ goTry }}\" style=\"background:#fff;color:var(--invoicecloud-primary);border:none;border-radius:10px;padding:18px 40px;font-size:16px;font-weight:700;cursor:pointer;box-shadow:var(--invoicecloud-elevation-2)\" style-hover=\"background:var(--invoicecloud-secondary-tint)\">Try It Out<\u002Fbutton>\n        <div style=\"font-size:13px;color:rgba(255,255,255,.65);margin-top:var(--invoicecloud-spacing-s)\">No account or credit card required to preview<\u002Fdiv>\n      <\u002Fsection>\n      <section style=\"max-width:1100px;margin:-56px auto 80px;padding:0 var(--invoicecloud-spacing-l);display:grid;grid-template-columns:repeat(3,1fr);gap:var(--invoicecloud-spacing-m);position:relative;flex:1;width:100%\">\n        <sc-for list=\"{{ landingFeatures }}\" as=\"f\" hint-placeholder-count=\"3\">\n          <div style=\"background:var(--invoicecloud-surface-default-background);border:1px solid var(--invoicecloud-surface-default-border);border-radius:14px;box-shadow:var(--invoicecloud-card-shadow);padding:var(--invoicecloud-spacing-m)\">\n            <div style=\"width:44px;height:44px;border-radius:10px;background:var(--invoicecloud-primary-tint);display:flex;align-items:center;justify-content:center;margin-bottom:var(--invoicecloud-spacing-s)\">\n              <img src=\"{{ f.iconSrc }}\" alt=\"\" style=\"width:22px;height:22px\">\n            <\u002Fdiv>\n            <h3 style=\"font-size:18px;margin-bottom:var(--invoicecloud-spacing-xs)\">{{ f.title }}<\u002Fh3>\n            <p style=\"font-size:14px;color:var(--invoicecloud-utility-neutral-70)\">{{ f.desc }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fsection>\n      <footer style=\"text-align:center;padding:var(--invoicecloud-spacing-l);font-size:12px;color:var(--invoicecloud-utility-neutral-60)\">InvoiceCloud Payment Experience Builder — a guided demo, not a live billing system.<\u002Ffooter>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ================= WIZARD ================= -->\n  <sc-if value=\"{{ screenIsWizard }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:var(--invoicecloud-spacing-xl) var(--invoicecloud-spacing-l)\">\n      <img src=\"be84f046-35c3-4c1e-8db8-6ce363b6bacd\" alt=\"InvoiceCloud\" style=\"height:22px;margin-bottom:var(--invoicecloud-spacing-l)\">\n      <div style=\"width:100%;max-width:640px;background:var(--invoicecloud-surface-default-background);border:1px solid var(--invoicecloud-surface-default-border);border-radius:14px;box-shadow:var(--invoicecloud-card-shadow);padding:var(--invoicecloud-spacing-l)\">\n\n        <div role=\"progressbar\" style=\"margin-bottom:var(--invoicecloud-spacing-l)\">\n          <div style=\"position:relative;height:4px;background:var(--invoicecloud-utility-neutral-10);border-radius:4px;margin-bottom:var(--invoicecloud-spacing-s)\">\n            <div style=\"position:absolute;left:0;top:0;height:4px;border-radius:4px;background:var(--invoicecloud-primary);transition:width .3s ease-in-out;width:{{ stepperPct }}%\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;font-size:12px;color:var(--invoicecloud-utility-neutral-60)\">\n            <sc-for list=\"{{ stepLabels }}\" as=\"lbl\" hint-placeholder-count=\"3\">\n              <span style=\"font-weight:{{ lbl.weight }};color:{{ lbl.color }}\">{{ lbl.text }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ wizardStepIs0 }}\" hint-placeholder-val=\"{{ true }}\">\n          <h2 style=\"margin-bottom:var(--invoicecloud-spacing-xs)\">What line of business is this for?<\u002Fh2>\n          <p style=\"font-size:14px;color:var(--invoicecloud-utility-neutral-70);margin-bottom:var(--invoicecloud-spacing-m)\">We'll tailor terminology, fees and compliance checks to your vertical.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:var(--invoicecloud-spacing-s)\">\n            <sc-for list=\"{{ verticals }}\" as=\"v\" hint-placeholder-count=\"3\">\n              <button type=\"button\" sc-camel-on-click=\"{{ v.onSelect }}\" style=\"display:flex;align-items:center;gap:var(--invoicecloud-spacing-s);text-align:left;padding:var(--invoicecloud-spacing-s);border-radius:10px;cursor:pointer;background:{{ v.bg }};border:1.5px solid {{ v.border }}\">\n                <div style=\"width:40px;height:40px;flex:none;border-radius:10px;background:var(--invoicecloud-primary-tint);display:flex;align-items:center;justify-content:center\">\n                  <img src=\"{{ v.iconSrc }}\" alt=\"\" style=\"width:20px;height:20px\">\n                <\u002Fdiv>\n                <div>\n                  <div style=\"font-weight:500;font-size:16px\">{{ v.label }}<\u002Fdiv>\n                  <div style=\"font-size:13px;color:var(--invoicecloud-utility-neutral-70)\">{{ v.desc }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ wizardStepIs1 }}\" hint-placeholder-val=\"{{ false }}\">\n          <h2 style=\"margin-bottom:var(--invoicecloud-spacing-xs)\">Tell us about the business<\u002Fh2>\n          <p style=\"font-size:14px;color:var(--invoicecloud-utility-neutral-70);margin-bottom:var(--invoicecloud-spacing-m)\">Your zip code helps us surface the right autopay, refund and fee-disclosure rules.<\u002Fp>\n          <label style=\"display:block;font-size:13px;font-weight:500;margin-bottom:var(--invoicecloud-spacing-xxs)\">Business name<\u002Flabel>\n          <input type=\"text\" value=\"{{ bizName }}\" sc-camel-on-change=\"{{ setBizName }}\" placeholder=\"e.g. Riverside Water Co.\" style=\"width:100%;padding:12px 14px;border-radius:4px;border:1px solid var(--invoicecloud-surface-default-border);font-size:16px;margin-bottom:var(--invoicecloud-spacing-m)\">\n          <label style=\"display:block;font-size:13px;font-weight:500;margin-bottom:var(--invoicecloud-spacing-xxs)\">Zip code where you conduct business<\u002Flabel>\n          <input type=\"text\" inputmode=\"numeric\" value=\"{{ zip }}\" sc-camel-on-change=\"{{ setZip }}\" placeholder=\"94103\" style=\"width:180px;padding:12px 14px;border-radius:4px;border:1px solid var(--invoicecloud-surface-default-border);font-size:16px;font-family:var(--invoicecloud-font-family-mono)\">\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ wizardStepIs2 }}\" hint-placeholder-val=\"{{ false }}\">\n          <h2 style=\"margin-bottom:var(--invoicecloud-spacing-xs)\">Do you have a website?<\u002Fh2>\n          <p style=\"font-size:14px;color:var(--invoicecloud-utility-neutral-70);margin-bottom:var(--invoicecloud-spacing-m)\">We'll scan it for your logo, brand colors and fonts to match your preview to your existing brand.<\u002Fp>\n          <input type=\"text\" value=\"{{ website }}\" sc-camel-on-change=\"{{ setWebsite }}\" disabled=\"{{ skipWebsite }}\" placeholder=\"www.yourbusiness.com\" style=\"width:100%;padding:12px 14px;border-radius:4px;border:1px solid var(--invoicecloud-surface-default-border);font-size:16px;margin-bottom:var(--invoicecloud-spacing-s);opacity:{{ websiteInputOpacity }}\">\n          <label style=\"display:flex;align-items:center;gap:var(--invoicecloud-spacing-xs);font-size:14px;color:var(--invoicecloud-utility-neutral-70);cursor:pointer\">\n            <input type=\"checkbox\" checked=\"{{ skipWebsite }}\" sc-camel-on-change=\"{{ toggleSkipWebsite }}\">\n            I don't have a website yet — use smart defaults for my vertical\n          <\u002Flabel>\n          <label style=\"display:block;font-size:13px;font-weight:500;margin-top:var(--invoicecloud-spacing-m);margin-bottom:4px\">Or upload your logo<\u002Flabel>\n          <sc-if value=\"{{ showUploadedLogo }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;align-items:center;gap:var(--invoicecloud-spacing-s)\">\n              <img src=\"{{ logoDataUrl }}\" alt=\"Uploaded logo\" style=\"width:44px;height:44px;border-radius:10px;object-fit:cover;border:1px solid var(--invoicecloud-surface-default-border)\">\n              <button type=\"button\" sc-camel-on-click=\"{{ clearLogo }}\" style=\"background:none;border:1px solid var(--invoicecloud-surface-default-border);border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer\">Remove<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ showNoUploadedLogo }}\" hint-placeholder-val=\"{{ true }}\">\n            <input type=\"file\" accept=\"image/*\" sc-camel-on-change=\"{{ setLogoFile }}\" style=\"font-size:13px\">\n          <\u002Fsc-if>\n        <\u002Fsc-if>\n\n        <div style=\"display:flex;justify-content:space-between;margin-top:var(--invoiceclo margin-bottom:var(--invoicecloud-spacing-xs)\">AutoPay policy<\u002Fh3>\n        <p style=\"font-size:14px;color:var(--invoicecloud-utility-neutral-70);margin-bottom:var(--invoicecloud-spacing-s)\">Allow payers to enroll in AutoPay for this line of business?<\u002Fp>\n        <div style=\"display:flex;gap:var(--invoicecloud-spacing-xs);margin-bottom:var(--invoicecloud-spacing-s)\">\n          <button type=\"button\" sc-camel-on-click=\"{{ allowAutopayYesClick }}\" style=\"padding:10px 24px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;background:{{ allowAutopayYesBg }};border:1.5px solid {{ allowAutopayYesBorder }};color:var(--invoicecloud-utility-neutral-100)\">Yes<\u002Fbutton>\n          <button type=\"button\" sc-camel-on-click=\"{{ allowAutopayNoClick }}\" style=\"padding:10px 24px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;background:{{ allowAutopayNoBg }};border:1.5px solid {{ allowAutopayNoBorder }};color:var(--invoicecloud-utility-neutral-100)\">No<\u002Fbutton>\n        <\u002Fdiv>\n        <sc-if value=\"{{ showForceEnrollChoice }}\" hint-placeholder-val=\"{{ false }}\">\n          <p style=\"font-size:14px;color:var(--invoicecloud-utility-neutral-70);margin-bottom:var(--invoicecloud-spacing-s)\">Require new payers to enroll in AutoPay when making their first payment?<\u002Fp>\n          <div style=\"display:flex;gap:var(--invoicecloud-spacing-xs);margin-bottom:var(--invoicecloud-spacing-s)\">\n            <button type=\"button\" sc-camel-on-click=\"{{ forceEnrollYesClick }}\" style=\"padding:10px 24px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;background:{{ forceEnrollYesBg }};border:1.5px solid {{ forceEnrollYesBorder }};color:var(--invoicecloud-utility-neutral-100)\">Yes<\u002Fbutton>\n            <button type=\"button\" sc-camel-on-click=\"{{ forceEnrollNoClick }}\" style=\"padding:10px 24px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;background:{{ forceEnrollNoBg }};borde round:var(--invoicecloud-slate-05);border-right:1px solid var(--invoicecloud-surface-default-border);padding:var(--invoicecloud-spacing-m);display:flex;flex-direction:column\">\n        <img src=\"be84f046-35c3-4c1e-8db8-6ce363b6bacd\" alt=\"InvoiceCloud\" style=\"height:20px;margin-bottom:var(--invoicecloud-spacing-l)\">\n        <div style=\"display:flex;align-items:center;gap:var(--invoicecloud-spacing-xs);padding:10px 12px;border-radius:8px;background:var(--invoicecloud-primary-tint);color:var(--invoicecloud-primary);font-weight:500;font-size:14px;margin-bottom:4px\"><img src=\"d2a0c914-d21b-4b46-a534-1626a2f7b69c\" alt=\"\" style=\"width:18px;height:18px\">Home<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:var(--invoicecloud-spacing-xs);padding:10px 12px;border-radius:8px;font-size:14px;color:var(--invoicecloud-utility-neutral-70)\"><img src=\"65ac6053-1b7e-4f74-a320-060616d27179\" alt=\"\" style=\"width:18px;height:18px\">Lines of Business<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:var(--invoicecloud-spacing-xs);padding:10px 12px;border-radius:8px;font-size:14px;color:var(--invoicecloud-utility-neutral-70)\"><img src=\"b61c3430-9c43-4ff1-9877-3a044b205672\" alt=\"\" style=\"width:18px;height:18px\">Billing<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:var(--invoicecloud-spacing-xs);padding:10px 12px;border-radius:8px;font-size:14px;color:var(--invoicecloud-utility-neutral-70)\"><img src=\"bad9753b-c30a-43db-9da1-afb35dc6bc75\" alt=\"\" style=\"width:18px;height:18px\">Settings<\u002Fdiv>\n        <div style=\"flex:1\"><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:var(--invoicecloud-spacing-xs);padding:10px 12px;border-radius:8px;font-size:14px;color:var(--invoicecloud-utility-neutral-70)\"><img src=\"d03c63fb-2f57-4063-a3b9-641ccd6f08b6\" alt=\"\" style=\"width:18px;height:18px\">Help<\u002Fdiv>\n      <\u002Fnav>\n      <main style=\"flex:1;padding:var(--invoicecloud-spacing-xl);max-width:1250px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--invoicecloud-spacing-m)\">\n          <div>\n            <h2 style=\"margin-bottom:2px\">Welcome back<\u002Fh2>\n            <div style=\"font-size:13px;color:var(--invoicecloud-utility-neutral-60)\">demo@{{ siteSlug }}.com<\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"width:36px;height:36px;border-radius:50%;background:var(--invoicecloud-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px\">DM<\u002Fspan>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ showDraftBanner }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;background:var(--invoicecloud-intent-info-background);border:1px solid var(--invoicecloud-intent-info-border);border-radius:10px;padding:var(--invoicecloud-spacing-s) var(--invoicecloud-spacing-m);margin-bottom:var(--invoicecloud-spacing-l)\">\n            <span style=\"font-size:14px;color:var(--invoicecloud-intent-info)\">You're in draft mode — publish to make this live for payers.<\u002Fspan>\n            <button type=\"button\" sc-camel-on-click=\"{{ openCheckout }}\" style=\"background:var(--invoicecloud-intent-info);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer\">Publish<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <h3 style=\"font-size:16px;margin-bottom:var(--invoicecloud-spacing-s)\">Lines of business<\u002Fh3>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:var(--invoicecloud-spacing-m)\">\n          <sc-for list=\"{{ lobsView }}\" as=\"lob\" hint-placeholder-count=\"1\">\n            <div style=\"background:var(--invoicecloud-surface-default-background);border:1px solid var(--invoicecloud-surface-default-border);border-radius:14px;padding:var(--invoicecloud-spacing-m);box-shadow:var(--invoicecloud-card-shadow)\">\n              <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:var(--invoicecloud-spacing-s)\">\n                <div style=\"width:36px;height:36px;border-radius:8px;{{ lob.badgeCss }}\"><\u002Fdiv>\n                <span style=\"font-size:11px;font-weight:700;padding:4px 8px;border-radius:4px;{{ lob.statusCss }}\">{{ lob.statusLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-weight:500;font-size:16px;margin-bottom:2px\">{{ lob.bizName }}<\u002Fdiv>\n              <div style=\"font-size:13px;color:var(--invoicecloud-utility-neutral-60);margin-bottom:var(--invoicecloud-spacing-s)\">{{ lob.verticalLabel }} · {{ lob.compliance.state }}<\u002Fdiv>\n              <div style=\"display:flex;gap:var(--invoicecloud-spacing-xs)\">\n                <button type=\"button\" sc-camel-on-click=\"{{ lob.onPreview }}\" style=\"flex:1;background:none;border:1px solid var(--invoicecloud-surface-default-border);border-radius:8px;padding:8px;font-size:13px;cursor:pointer\">Preview<\u002Fbutton>\n                <button type=\"button\" sc-camel-on-click=\"{{ lob.onEdit }}\" style=\"flex:1;background:none;border:1px solid var(--invoicecloud-surface-default-border);border-radius:8px;padding:8px;font-size:13px;cursor:pointer\">Edit<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <button type=\"button\" sc-camel-on-click=\"{{ addLob }}\" style=\"border:1.5px dashed var(--invoicecloud-surface-default-border);border-radius:14px;background:none;color:var(--invoicecloud-utility-neutral-60);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--invoicecloud-spacing-xs);min-height:150px;cursor:pointer;font-size:14px\">\n            <img src=\"2ad452cc-aebc-433c-9932-05b79e120021\" alt=\"\" style=\"width:20px;height:20px\">\n            Add Line of Business\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fmain>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ================= STATEMENT DETAIL ================= -->\n  <sc-if value=\"{{ modalIsStatement }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;background:rgba(28,28,28,.5);display:flex;align-items:center;justify-content:center;z-index:50\">\n      <div style=\"background:#fff;border-radius:14px;padding:var(--invoicecloud-spacing-l);width:420px;box-shadow:var(--invoicecloud-elevation-3)\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:var(--invoicecloud-spacing-xs)\">\n          <h3 style=\"margin-bottom:2px\">{{ viewingStatement.label }}<\u002Fh3>\n          <button type=\"button\" sc-camel-on-click=\"{{ viewingStatement.onClose }}\" aria-label=\"Close\" style=\"background:none;border:none;cursor:pointer;padding:4px\"><img src=\"a6d5d67c-cfae-4e11-b00c-865946a3ac66\" alt=\"\" style=\"width:14px;height:14px\"><\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"font-size:13px;color:var(--invoicecloud-utility-neutral-60);margin-bottom:var(--invoicecloud-spacing-m)\">{{ viewingStatement.date }} · {{ viewingStatement.due }}<\u002Fdiv>\n        <div style=\"border:1px solid var(--invoicecloud-surface-default-border);border-radius:10px;padding:var(--invoicecloud-spacing-m);margin-bottom:var(--invoicecloud-spacing-m)\">\n          <sc-for list=\"{{ viewingStatement.breakdown }}\" as=\"line\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex;justify-content:space-between;font-size:14px;padding:6px 0;border-bottom:1px solid var(--invoicecloud-surface-default-border)\">\n              <span>{{ line.label }}<\u002Fspan><span style=\"font-family:var(--invoicecloud-font-family-mono)\">${{ line.amountFormatted }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <div style=\"display:flex;justify-content:space-between;font-weight:500;padding-top:var(--invoicecloud-spacing-xs)\">\n            <span>Total<\u002Fspan><span style=\"font-family:var(--invoicecloud-font-family-mono);font-size:18px\">${{ viewingStatement.amountFormatted }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;align-items:center\">\n          <button type=\"button\" style=\"background:none;border:1px solid var(--invoicecloud-surface-default-border);border-radius:8px;padding:10px 16px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px\"><img src=\"2162a3c1-d3c5-4401-94f2-372fa268ba09\" alt=\"\" style=\"width:14px;height:14px\">Download PDF<\u002Fbutton>\n          <sc-if value=\"{{ viewingStatement.isDue }}\" hint-placeholder-val=\"{{ false }}\">\n            <button type=\"button\" sc-camel-on-click=\"{{ viewingStatement.onPay }}\" style=\"background:var(--invoicecloud-primary);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer\">Pay Now<\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ================= MODALS ================= -->\n  <sc-if value=\"{{ modalIsSignup }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;background:rgba(28,28,28,.5);display:flex;align-items:center;justify-content:center;z-index:50\">\n      <form sc-camel-on-submit=\"{{ submitSignup }}\" style=\"background:#fff;border-radius:14px;padding:var(--invoicecloud-spacing-l);width:380px;box-shadow:var(--invoicecloud-elevation-3)\">\n        <h3 style=\"margin-bottom:var(--invoicecloud-spacing-xxs)\">Create your account<\u002Fh3>\n        <p style=\"font-size:13px;color:var(--invoicecloud-utility-neutral-70);margin-bottom:var(--invoicecloud-spacing-m)\">Save this configuration without publishing it live.<\u002Fp>\n        <label style=\"display:block;font-size:13px;font-weight:500;margin-bottom:4px\">Email<\u002Flabel>\n        <input type=\"email\" required=\"{{ true }}\" placeholder=\"you@business.com\" style=\"width:100%;padding:10px 12px;border-radius:4px;border:1px solid var(--invoicecloud-surface-default-border);margin-bottom:var(--invoicecloud-spacing-s)\">\n        <label style=\"display:block;font-size:13px;font-weight:500;margin-bottom:4px\">Password<\u002Flabel>\n        <input type=\"password\" required=\"{{ true }}\" placeholder=\"••••••••\" style=\"width:100%;padding:10px 12px;border-radius:4px;border:1px solid var(--invoicecloud-surface-default-border);margin-bottom:var(--invoicecloud-spacing-l)\">\n        <div style=\"display:flex;justify-content:flex-end;gap:var(--invoicecloud-spacing-s)\">\n          <button type=\"button\" sc-camel-on-click=\"{{ closeModal }}\" style=\"background:none;border:none;color:var(--invoicecloud-utility-neutral-60);cursor:pointer\">Cancel<\u002Fbutton>\n          <button type=\"submit\" style=\"background:var(--invoicecloud-primary);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-weight:700;cursor:pointer\">Create Account<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fform>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ modalIsCheckout }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;background:rgba(28,28,28,.5);display:flex;align-items:center;justify-content:center;z-index:50\">\n      <form sc-camel-on-submit=\"{{ submitCheckout }}\" style=\"background:#fff;border-radius:14px;padding:var(--invoicecloud-spacing-l);width:420px;box-shadow:var(--invoicecloud-elevation-3)\">\n        <h3 style=\"margin-bottom:var(--invoicecloud-spacing-xxs)\">Publish — $199/mo<\u002Fh3>\n        <p style=\"font-size:13px;color:var(--invoicecloud-utility-neutral-70);margin-bottom:var(--invoicecloud-spacing-m)\">Mock checkout — no real payment is processed.<\u002Fp>\n        <label style=\"display:block;font-size:13px;font-weight:500;margin-bottom:4px\">Name on card<\u002Flabel>\n        <input type=\"text\" required=\"{{ true }}\" placeholder=\"Jamie Rivera\" style=\"width:100%;padding:10px 12px;border-radius:4px;border:1px solid var(--invoicecloud-surface-default-border);margin-bottom:var(--invoicecloud-spacing-s)\">\n        <label style=\"display:block;font-size:13px;font-weight:500;margin-bottom:4px\">Card number<\u002Flabel>\n        <input type=\"text\" required=\"{{ true }}\" placeholder=\"4242 4242 4242 4242\" style=\"width:100%;padding:10px 12px;border-radius:4px;border:1px solid var(--invoicecloud-surface-default-border);margin-bottom:var(--invoicecloud-spacing-s);font-family:var(--invoicecloud-font-family-mono)\">\n        <div style=\"display:flex;gap:var(--invoicecloud-spacing-s);margin-bottom:var(--invoicecloud-spacing-l)\">\n          <input type=\"text\" required=\"{{ true }}\" placeholder=\"MM/YY\" style=\"width:100%;padding:10px 12px;border-radius:4px;border:1px solid var(--invoicecloud-surface-default-border);font-family:var(--invoicecloud-font-family-mono)\">\n          <input type=\"text\" required=\"{{ true }}\" placeholder=\"CVC\" style=\"width:100%;padding:10px 12px;border-radius:4px;border:1px solid var(--invoicecloud-surface-default-border);font-family:var(--invoicecloud-font-family-mono)\">\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:flex-end;gap:var(--invoicecloud-spacing-s)\">\n          <button type=\"button\" sc-camel-on-click=\"{{ closeModal }}\" style=\"background:none;border:none;color:var(--invoicecloud-utility-neutral-60);cursor:pointer\">Cancel<\u002Fbutton>\n          <button type=\"submit\" style=\"background:var(--invoicecloud-primary);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-weight:700;cursor:pointer\">Confirm Purchase<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fform>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;startScreen&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;auto&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;auto&quot;,&quot;landing&quot;,&quot;wizard&quot;,&quot;analyzing&quot;,&quot;results&quot;,&quot;preview&quot;,&quot;pricing&quot;,&quot;dashboard&quot;],&quot;section&quot;:&quot;Demo controls&quot;},&quot;demoSpeed&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;normal&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;normal&quot;,&quot;fast&quot;],&quot;section&quot;:&quot;Demo controls&quot;}}\">\nconst VERTICALS = [\n  { id:'insurance', label:'Insurance', icon:'DocumentSearch', desc:'Premium billing, claims payments, policy renewals' },\n  { id:'utilities', label:'Utilities', icon:'Bolt', desc:'Electric, water, gas, and municipal utility billing' },\n  { id:'tax', label:'Government / Taxes', icon:'Invoice', desc:'Property tax, court fees, and municipal payments' },\n];\n\nconst ICON_RESOURCE_MAP = {\n  DocumentSearch: 'iconDocumentSearch', Bolt: 'iconBolt', Invoice: 'iconInvoice',\n  Checkmark: 'iconCheckmark', Spinner: 'iconSpinner', Card: 'iconCard', Bank: 'iconBank',\n  Magic: 'iconMagic', AutoPay: 'iconAutoPay',\n};\nfunction iconUrl(name){\n  const id = ICON_RESOURCE_MAP[name];\n  return (id && window.__resources && window.__resources[id]) ? window.__resources[id] : `./assets/icons/${name}.svg`;\n}\n\nconst PALETTES = [\n  { primary:'#0B4F6C', secondary:'#01BAEF', accent:'#EAF7FB', font:'Poppins' },\n  { primary:'#1B4332', secondary:'#40916C', accent:'#E7F5EC', font:'Work Sans' },\n  { primary:'#6A0F0F', secondary:'#B23A48', accent:'#FBEDE7', font:'Source Sans Pro' },\n  { primary:'#2B2D42', secondary:'#8D99AE', accent:'#EDF2F4', font:'Montserrat' },\n  { primary:'#3A0CA3', secondary:'#7209B7', accent:'#F1EAFB', font:'Nunito Sans' },\n  { primary:'#0D3B66', secondary:'#F4A261', accent:'#FCEFDF', font:'Lato' },\n];\n\nconst STATEMENTS = [\n  { id:'240183', label:'Statement #240183', date:'Posted Jul 1', due:'Due Aug 4', status:'Due', amount:128.42,\n    breakdown:[{ label:'Base charge', amount:98.00 },{ label:'Usage adjustment', amount:22.42 },{ label:'Municipal surcharge', amount:8.00 }] },\n  { id:'239022', label:'Statement #239022', date:'Posted Jun 1', due:'Paid Jun 3', status:'Paid', amount:112.15,\n    breakdown:[{ label:'Base charge', amount:96.00 },{ label:'Usage adjustment', amount:16.15 }] },\n];\nconst STATE_BY_DIGIT = ['Connecticut','New York','Virginia','Florida','Michigan','Minnesota','Illinois','Texas','Colorado','California'];\n\nfunction hashString(s){ let h=0; for(let i=0;i<s.length;i++){ h = (h*31 + s.charCodeAt(i)) >>> 0; } return h; }\nfunction zipToState(zip){ const d = zip && zip[0] ? parseInt(zip[0],10) : 9; return STATE_BY_DIGIT[isNaN(d)?9:d]; }\nfunction paletteFromString(str){ const p = PALETTES[hashString(str||'default') % PALETTES.length]; return p; }\nfunction initialsFrom(name){ return (name||'').trim().split(/\\s+/).slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('') || 'YB'; }\nfunction domainFromWebsite(url){ if(!url) return ''; return url.trim().toLowerCase().replace(/^https?:\\/\\//,'').replace(/^www\\./,'').split('/')[0]; }\n\nfunction complianceBullets(vertical, state){\n  const map = {\n    insurance: [\n      `${state} requires policyholders receive a written AutoPay disclosure before enrollment.`,\n      `Premium refunds must be issued within 10 business days of policy cancellation in ${state}.`,\n    ],\n    utilities: [\n      `${state} utility regulators require a 3-day right-to-cancel window on recurring bank-draft enrollments.`,\n      `Late fees are capped at 1.5% per month for residential utility accounts in ${state}.`,\n    ],\n    tax: [\n      `${state} requires a separate opt-in for automatic property-tax withdrawals, confirmed by email or mail.`,\n      `Card-payment convenience fees must be disclosed before checkout under ${state} statute.`,\n    ],\n  };\n  return map[vertical] || map.utilities;\n}\n\nclass Component extends DCLogic {\n  state = {\n    screen: (this.props.startScreen && this.props.startScreen !== 'auto') ? this.props.startScreen : 'landing',\n    wizardStep: 0,\n    vertical: null, bizName: '', zip: '', website: '', skipWebsite: false,\n    brand: null, compliance: null,\n    payerStep: 0, amount: 128.42, methodType: 'card', autopayOptIn: false, paperlessOptIn: false, processing: false,\n    analyzeStage: 0,\n    modal: null, purchased: false, accountCreated: false, lobs: [], editingLobId: null, pendingLob: false,\n    viewingStatementId: null,\n    agreedToCompliance: false, docs: [], newDocName: '', allowAutopay: null, forceEnrollAutopay: false,\n    logoDataUrl: null, logoFetchOk: false,\n  };\n\n  timers = [];\n  componentWillUnmount(){ this.timers.forEach(clearTimeout); }\n  speedFactor(){ return this.props.demoSpeed === 'fast' ? 0.3 : 1; }\n\n  goTry = () => this.setState({ screen:'wizard', wizardStep:0, vertical:null, bizName:'', zip:'', website:'', skipWebsite:false, editingLobId:null, brand:null, compliance:null, agreedToCompliance:false, docs:[], newDocName:'', allowAutopay:null, forceEnrollAutopay:false, logoDataUrl:null, logoFetchOk:false });\n  selectVertical = (v) => this.setState({ vertical: v });\n  setBizName = (e) => this.setState({ bizName: e.target.value });\n  setZip = (e) => { const v = e.target.value; if (/^\\d{0,5}$/.test(v)) this.setState({ zip: v }); };\n  checkLogoFetch = (website, skip) => {\n    const domain = domainFromWebsite(website);\n    if (!domain || skip) { this.setState({ logoFetchOk: false }); return; }\n    const img = new Image();\n    img.onload = () => this.setState({ logoFetchOk: true });\n    img.onerror = () => this.setState({ logoFetchOk: false });\n    img.src = `https://logo.clearbit.com/${domain}`;\n  };\n  setWebsite = (e) => { this.setState({ website: e.target.value, skipWebsite: false, logoFetchOk: false }); this.checkLogoFetch(e.target.value, false); };\n  toggleSkipWebsite = () => this.setState(s => {\n    const skip = !s.skipWebsite;\n    const website = skip ? '' : s.website;\n    this.checkLogoFetch(website, skip);\n    return { skipWebsite: skip, website, logoFetchOk: false };\n  });\n  setLogoFile = (e) => {\n    const file = e.target.files && e.target.files[0];\n    if (!file) return;\n    const reader = new FileReader();\n    reader.onload = () => this.setState({ logoDataUrl: reader.result });\n    reader.readAsDataURL(file);\n  };\n  clearLogo = () => this.setState({ logoDataUrl: null });\n\n  nextStep = () => this.setState(s => ({ wizardStep: Math.min(2, s.wizardStep + 1) }));\n  prevStep = () => this.setState(s => ({ wizardStep: Math.max(0, s.wizardStep - 1) }));\n\n  runAnalysis = () => {\n    this.setState({ screen:'analyzing', analyzeStage:0 });\n    const f = this.speedFactor();\n    this.timers.push(setTimeout(() => this.setState({ analyzeStage:1 }), 900*f));\n    this.timers.push(setTimeout(() => this.setState({ analyzeStage:2 }), 1900*f));\n    this.timers.push(setTimeout(() => this.finishAnalysis(), 2900*f));\n  };\n\n  finishAnalysis = () => {\n    const { vertical, zip, website, skipWebsite } = this.state;\n    const stateName = zipToState(zip);\n    const bullets = complianceBullets(vertical, stateName);\n    const palette = (website && !skipWebsite) ? paletteFromString(website) : paletteFromString(vertical || 'default');\n    const initials = initialsFrom(this.state.bizName);\n    this.setState({ screen:'results', compliance:{ state: stateName, bullets }, brand:{ ...palette, initials } });\n  };\n\n  confirmPreview = () => this.setState({ screen:'preview', payerStep:0, methodType:'card', autopayOptIn: this.state.forceEnrollAutopay, paperlessOptIn:false, processing:false });\n  redoWizard = () => this.setState({ screen:'wizard', wizardStep:0 });\n  setNewDocName = (e) => this.setState({ newDocName: e.target.value });\n  addDocument = () => this.setState(s => s.newDocName.trim() ? { docs:[...s.docs, s.newDocName.trim()], newDocName:'' } : null
