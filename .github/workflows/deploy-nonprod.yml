name: Deploy nonprod

# The pre-merge confidence gate: deploy the change to the shared ic-nonprod environment and run
# the deployed functional + browser suites against it. This runs as a GitHub **merge queue**
# check (event `merge_group`) so it executes on the exact commit that is about to land — main
# with the queued PR merged in — one entry at a time, and blocks the merge unless it is green.
#
# Why the merge queue: it only ever contains PRs a maintainer has already approved and enqueued,
# so the job runs in the trusted base-repo context with secrets without exposing them to
# unreviewed / fork code. That removes the old labelled deploy-on-PR footgun (secrets reachable
# from unreviewed head code) while making the functional gate mandatory rather than opt-in.
#
# `workflow_dispatch` is kept for on-demand nonprod deploys (demos / manual verification) of any
# ref chosen in the Actions UI.
#
# NOTE (repo settings, one-time): make this a required check by enabling a merge queue on `main`
# (ruleset: "Require merge queue", max entries to build = 1 so the shared namespace is never
# deployed twice at once) and marking "Deploy & functional gate (ic-nonprod)" — plus the CI
# build/test/gate checks, which also run on merge_group — as required status checks.

on:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # One shared ic-nonprod namespace: never deploy two commits into it at once. cancel-in-progress
  # is false so an in-flight merge-queue check is allowed to finish (cancelling it would fail the
  # queue entry); the merge queue's own max-concurrency=1 keeps entries from piling up.
  group: deploy-nonprod
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve target commit
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.pick.outputs.sha }}
      base: ${{ steps.pick.outputs.base }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "merge_group" ]; then
            # The temporary merge commit (main + queued PR) and the branch it will land on.
            echo "sha=${{ github.event.merge_group.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "base=${{ github.event.merge_group.base_sha }}" >> "$GITHUB_OUTPUT"
          else
            # workflow_dispatch: deploy whatever ref was selected; full rebuild (no base diff).
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "base=" >> "$GITHUB_OUTPUT"
          fi

  build-images:
    needs: resolve
    uses: ./.github/workflows/build-images.yml
    with:
      image_tag: ${{ needs.resolve.outputs.sha }}
      source_ref: ${{ needs.resolve.outputs.sha }}
      base_ref: ${{ needs.resolve.outputs.base }}
    secrets:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}

  deploy:
    name: Deploy & functional gate (ic-nonprod)
    needs: [resolve, build-images]
    runs-on: ubuntu-latest
    environment: nonprod
    env:
      IMAGE_TAG: ${{ needs.resolve.outputs.sha }}
      REGISTRY: acrichackjk4zmntatjem4.azurecr.io
      AKS_RG: ${{ vars.AKS_RG || 'rg-ic-hack' }}
      AKS_NAME: ${{ vars.AKS_NAME || 'aks-ic-hack' }}
      OVERLAY: deploy/kubernetes/overlays/nonprod
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.sha }}

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up kubelogin
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: v0.2.19

      - name: Verify least-privilege AKS authentication
        run: |
          mapfile -t auth < <(az aks show \
            --resource-group "$AKS_RG" --name "$AKS_NAME" \
            --query '[aadProfile.managed, aadProfile.enableAzureRbac]' -o tsv)
          if [[ "${auth[0]:-}" != "true" || "${auth[1]:-}" != "true" ]]; then
            echo "ERROR: AKS must use managed Entra ID and Azure RBAC; refusing local system:masters credentials." >&2
            exit 1
          fi

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "$AKS_RG" --name "$AKS_NAME" \
            --overwrite-existing
          kubelogin convert-kubeconfig -l azurecli

      - name: Pin image tags to the target commit
        run: |
          sed -i "s/newTag: latest/newTag: ${IMAGE_TAG}/" "${OVERLAY}/kustomization.yaml"
          grep 'newTag' "${OVERLAY}/kustomization.yaml"

      # The nonprod ic-workload service account must annotate the DEDICATED nonprod workload
      # identity (uami-ic-hack-nonprod-workload) so its pods reach only the nonprod Cosmos
      # account. The client id is a GUID assigned at identity-creation time, so it's not
      # committed — resolve it from the Bicep output and substitute the placeholder in the
      # nonprod overlay before deploying.
      - name: Inject nonprod workload identity client id
        run: |
          NONPROD_CLIENT_ID=$(az deployment sub show --name ic-hack \
            --query 'properties.outputs.nonprodWorkloadIdentityClientId.value' -o tsv 2>/dev/null || true)
          if [ -z "$NONPROD_CLIENT_ID" ]; then
            # The dedicated nonprod identity isn't provisioned yet (its Bicep hasn't been applied).
            # Drop the SA override so pods fall back to the shared base identity — the current,
            # pre-isolation behavior — rather than deploying an invalid placeholder client id.
            # Once the infra is applied and the output exists, this branch stops running and the
            # dedicated nonprod identity is used automatically.
            echo "::warning::nonprodWorkloadIdentityClientId output not found; using the shared base identity until infra/bicep is applied."
            sed -i '/- path: service-account.yaml/d' "${OVERLAY}/kustomization.yaml"
          else
            sed -i "s/REPLACE_WITH_NONPROD_WORKLOAD_IDENTITY_CLIENT_ID/${NONPROD_CLIENT_ID}/" \
              "${OVERLAY}/service-account.yaml"
            grep 'client-id' "${OVERLAY}/service-account.yaml"
          fi

      - name: Deploy
        run: kubectl apply -k "${OVERLAY}"

      # Wait for the static frontends to finish rolling out before smoke-testing them. The APIs
      # get their own rollout waits below (after the telemetry env is set); the frontends need an
      # explicit wait here because the browser smoke otherwise races the rollout and can hit the
      # previous (pre-change) pod — especially the single-replica Studio.
      - name: Wait for frontends to roll out
        run: |
          kubectl -n ic-nonprod rollout status deployment/ic-biller-experience-studio --timeout=180s
          kubectl -n ic-nonprod rollout status deployment/ic-biller-payments-pwa --timeout=180s

      - name: Configure correlated Azure telemetry
        run: |
          APPINSIGHTS=$(az deployment sub show --name ic-hack --query 'properties.outputs.appInsightsConnectionString.value' -o tsv)
          kubectl -n ic-nonprod set env \
            deployment/ic-biller-experience-api \
            deployment/ic-invoice-api \
            deployment/ic-payment-api \
            deployment/ic-payer-account-api \
            APPLICATIONINSIGHTS_CONNECTION_STRING="$APPINSIGHTS" \
            APPLICATIONINSIGHTS_SAMPLING_RATIO="0.5"
          kubectl -n ic-nonprod rollout status deployment/ic-biller-experience-api --timeout=180s
          kubectl -n ic-nonprod rollout status deployment/ic-invoice-api --timeout=180s
          kubectl -n ic-nonprod rollout status deployment/ic-payment-api --timeout=180s
          kubectl -n ic-nonprod rollout status deployment/ic-payer-account-api --timeout=180s

      - name: Functional smoke tests
        run: ./scripts/smoke-test.sh ic-nonprod

      - name: Set up Node for browser smoke test
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tests/browser-smoke/package-lock.json

      - name: Install browser smoke test dependencies
        working-directory: tests/browser-smoke
        run: |
          npm ci
          npx playwright install --with-deps chromium

      # Loads each deployed frontend through the nonprod gateway (port-forwarded, same as the
      # functional smoke tests) and asserts its browser telemetry client boots and sends a beacon.
      # Both apps sit behind the same gateway and share GET /api/public/telemetry. The script
      # verifies that each exact session-start event and flow id is accepted by the ingestion
      # endpoint, avoiding a release-blocking wait for eventual query visibility.
      - name: Browser telemetry smoke test
        run: |
          GATEWAY_SVC=$(kubectl get svc -n ic-nonprod \
            -l gateway.networking.k8s.io/gateway-name=ic-nonprod-gateway \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          GATEWAY_SVC="${GATEWAY_SVC:-ic-nonprod-gateway}"
          echo "port-forwarding svc/${GATEWAY_SVC}"
          kubectl port-forward -n ic-nonprod "svc/${GATEWAY_SVC}" 18081:80 >/dev/null 2>&1 &
          PF_PID=$!
          trap 'kill $PF_PID 2>/dev/null || true' EXIT
          for _ in $(seq 1 30); do
            curl -fsS -o /dev/null "http://127.0.0.1:18081/pay/" \
              && curl -fsS -o /dev/null "http://127.0.0.1:18081/studio/" && break
            sleep 1
          done

          PWA_RESULT=$(TARGET_ORIGIN=http://127.0.0.1:18081 \
            TARGET_PATH=/pay/demo/ EXPECTED_EVENT=pwa.session_started \
            node tests/browser-smoke/telemetry-smoke.mjs)
          echo "payer PWA result: ${PWA_RESULT}"

          STUDIO_RESULT=$(TARGET_ORIGIN=http://127.0.0.1:18081 \
            TARGET_PATH=/studio/ EXPECTED_EVENT=studio.session_started \
            node tests/browser-smoke/telemetry-smoke.mjs)
          echo "biller Studio result: ${STUDIO_RESULT}"

      - name: Set up .NET for functional tests
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # Deployed functional tests: black-box HTTP acceptance tests that exercise the just-deployed
      # nonprod stack through the gateway (see docs/pronto-functional-testing-policy.md). The
      # blocking gate (functional & !known-gap) must pass before the merge queue lands the commit;
      # the known-gap suite documents behaviors we intend to fix and runs non-blocking (|| true)
      # until each fix removes its `known-gap` trait, moving it into the blocking gate.
      - name: Deployed functional tests (nonprod)
        run: |
          GATEWAY_SVC=$(kubectl get svc -n ic-nonprod \
            -l gateway.networking.k8s.io/gateway-name=ic-nonprod-gateway \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          GATEWAY_SVC="${GATEWAY_SVC:-ic-nonprod-gateway}"
          kubectl port-forward -n ic-nonprod "svc/${GATEWAY_SVC}" 18082:80 >/dev/null 2>&1 &
          PF_PID=$!
          trap 'kill $PF_PID 2>/dev/null || true' EXIT
          for _ in $(seq 1 30); do
            curl -fsS -o /dev/null "http://127.0.0.1:18082/api/health/ready" && break
            sleep 1
          done

          export PRONTO_FUNCTIONAL_BASE_URL=http://127.0.0.1:18082

          echo "::group::Blocking functional gate"
          dotnet test tests/Pronto.Functional.Tests/Pronto.Functional.Tests.csproj \
            --filter 'Category=functional&Category!=known-gap'
          echo "::endgroup::"

          echo "::group::Known-gap functional tests (non-blocking; expected to fail until fixed)"
          dotnet test tests/Pronto.Functional.Tests/Pronto.Functional.Tests.csproj \
            --filter 'Category=known-gap' \
            || echo "::warning::Known-gap functional tests failed as expected; see docs/pronto-functional-requirements.md"
          echo "::endgroup::"
