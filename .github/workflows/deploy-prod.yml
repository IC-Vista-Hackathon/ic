name: Deploy production

# On merge to main: build the merged commit's images and deploy them to the shared
# `ic` namespace on aks-ic-hack (publicly exposed via the kgateway Gateway), then
# smoke-test. Auto-deploy, no manual gate. Add required reviewers to the GitHub
# `production` Environment if a manual gate is ever wanted.

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  # Serialize prod deploys; never cancel an in-flight one.
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build-images:
    uses: ./.github/workflows/build-images.yml
    with:
      image_tag: ${{ github.sha }}
      source_ref: ${{ github.sha }}
    secrets:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}

  deploy:
    name: Deploy & smoke-test (ic)
    needs: build-images
    runs-on: ubuntu-latest
    environment: production
    env:
      IMAGE_TAG: ${{ github.sha }}
      REGISTRY: acrichackjk4zmntatjem4.azurecr.io
      AKS_RG: ${{ vars.AKS_RG || 'rg-ic-hack' }}
      AKS_NAME: ${{ vars.AKS_NAME || 'aks-ic-hack' }}
      OVERLAY: deploy/kubernetes/overlays/prod
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up kubelogin
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: v0.2.19

      - name: Verify least-privilege AKS authentication
        run: |
          mapfile -t auth < <(az aks show \
            --resource-group "$AKS_RG" --name "$AKS_NAME" \
            --query '[aadProfile.managed, aadProfile.enableAzureRbac]' -o tsv)
          if [[ "${auth[0]:-}" != "true" || "${auth[1]:-}" != "true" ]]; then
            echo "ERROR: AKS must use managed Entra ID and Azure RBAC; refusing local system:masters credentials." >&2
            exit 1
          fi

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "$AKS_RG" --name "$AKS_NAME" \
            --overwrite-existing
          kubelogin convert-kubeconfig -l azurecli

      - name: Pin image tags to the merged SHA
        run: |
          sed -i "s/newTag: latest/newTag: ${IMAGE_TAG}/" "${OVERLAY}/kustomization.yaml"
          grep 'newTag' "${OVERLAY}/kustomization.yaml"

      - name: Validate rendered manifests
        run: |
          rendered="$(kubectl kustomize "${OVERLAY}")"
          if grep -n '\${[^}]*}' <<<"$rendered"; then
            echo "ERROR: unresolved placeholder in rendered manifests" >&2
            exit 1
          fi

      - name: Deploy
        run: kubectl apply -k "${OVERLAY}"

      - name: Configure runtime deployment values
        run: |
          APPINSIGHTS=$(az deployment sub show --name ic-hack --query 'properties.outputs.appInsightsConnectionString.value' -o tsv)
          [[ -n "$APPINSIGHTS" && "$APPINSIGHTS" != "null" ]] \
            || { echo "ERROR: Application Insights connection string output is unavailable." >&2; exit 1; }
          kubectl -n ic set env \
            deployment/ic-biller-experience-api \
            deployment/ic-invoice-api \
            deployment/ic-payment-api \
            deployment/ic-payer-account-api \
            APPLICATIONINSIGHTS_CONNECTION_STRING="$APPINSIGHTS"
          kubectl -n ic set env \
            deployment/ic-biller-experience-worker \
            APPLICATIONINSIGHTS_CONNECTION_STRING="$APPINSIGHTS" \
            BundleBuild__BuilderImage="${REGISTRY}/ic-payer-experience-builder:${IMAGE_TAG}"
          kubectl -n ic set env \
            deployment/ic-payer-experience-router \
            APPLICATIONINSIGHTS_CONNECTION_STRING="$APPINSIGHTS"
          kubectl -n ic rollout status deployment/ic-biller-experience-api --timeout=180s
          kubectl -n ic rollout status deployment/ic-invoice-api --timeout=180s
          kubectl -n ic rollout status deployment/ic-payment-api --timeout=180s
          kubectl -n ic rollout status deployment/ic-payer-account-api --timeout=180s
          kubectl -n ic rollout status deployment/ic-biller-experience-worker --timeout=180s
          kubectl -n ic rollout status deployment/ic-payer-experience-router --timeout=180s

      - name: Remove superseded Biller Experience routes
        run: |
          kubectl delete httproute -n ic \
            ic-biller-experience-api \
            ic-biller-experience-studio \
            ic-biller-payments-pwa \
            --ignore-not-found

      - name: Functional smoke tests
        run: ./scripts/smoke-test.sh ic

      - name: Public gateway and publication smoke tests
        env:
          BASE_URL: http://pronto.eastus2.cloudapp.azure.com
          PUBLISHED_EXPERIENCE_SLUG: ${{ vars.SMOKE_PUBLISHED_EXPERIENCE_SLUG }}
        run: ./deploy/smoke/smoke-test.sh
