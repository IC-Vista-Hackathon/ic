name: Advisory security scan

# Filesystem + IaC/misconfiguration scanning with Trivy (dependencies, Dockerfiles,
# Kubernetes manifests). The existing repository baseline contains unresolved high-severity
# findings, so this workflow is explicitly advisory until that baseline is remediated. A SARIF
# upload to the GitHub Security tab is attempted too, but remains non-blocking.
# CodeQL (code) and dependency-review (supply chain) run in their own workflows.
#
# Trivy is installed via its official script (pinned) rather than trivy-action,
# whose older tags reference a deleted setup-trivy release.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: scan-${{ github.ref }}
  cancel-in-progress: true

env:
  TRIVY_VERSION: v0.71.2

jobs:
  trivy:
    name: Advisory Trivy filesystem & config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b "${RUNNER_TEMP}/bin" "${TRIVY_VERSION}"
          echo "${RUNNER_TEMP}/bin" >> "$GITHUB_PATH"

      - name: Trivy scan (SARIF)
        run: |
          trivy fs --scanners vuln,misconfig,secret \
            --severity CRITICAL,HIGH --ignore-unfixed --exit-code 0 \
            --format sarif --output trivy-results.sarif .

      - name: Upload SARIF to Security tab
        # Requires GitHub Advanced Security; non-blocking until it's enabled.
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

      - name: Advisory high and critical findings
        run: |
          {
            echo "## Advisory Trivy scan"
            echo "High/critical findings are reported but do not block merges until the existing baseline is remediated."
          } >> "$GITHUB_STEP_SUMMARY"
          trivy fs --scanners vuln,misconfig,secret \
            --severity CRITICAL,HIGH --ignore-unfixed --exit-code 0 .
