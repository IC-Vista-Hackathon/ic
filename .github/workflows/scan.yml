name: Security scan

# Filesystem + IaC/misconfiguration scanning with Trivy (dependencies, Dockerfiles,
# Kubernetes manifests). Findings are always printed to the job log (table). A SARIF
# upload to the GitHub Security tab is attempted too, but it needs GitHub Advanced
# Security — so it's non-blocking until GHAS is enabled on the repo.
# CodeQL (code) and dependency-review (supply chain) run in their own workflows.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy:
    name: Trivy filesystem & config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy scan (table, printed to log)
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0 # v0.29.0
        with:
          scan-type: fs
          scanners: vuln,misconfig,secret
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0 # v0.29.0
        with:
          scan-type: fs
          scanners: vuln,misconfig,secret
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload SARIF to Security tab
        # Requires GitHub Advanced Security; non-blocking until it's enabled.
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs
