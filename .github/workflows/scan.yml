name: Security scan

# Filesystem + IaC/misconfiguration scanning with Trivy (dependencies, Dockerfiles,
# Kubernetes manifests). Results are uploaded to the GitHub Security tab as SARIF.
# CodeQL (code) and dependency-review (supply chain) run in their own workflows.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy:
    name: Trivy filesystem & config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy scan (vuln + misconfig + secrets)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scanners: vuln,misconfig,secret
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs
