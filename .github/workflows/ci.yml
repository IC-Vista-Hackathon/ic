name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Required checks must also run on the merge queue's temporary ref, or the queue can never
  # satisfy them and merges hang. These are hermetic (no deploy), so they run per queue entry.
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Pronto.slnx

      - name: Build
        run: dotnet build Pronto.slnx --no-restore -c Release

      - name: Test
        run: >
          dotnet test Pronto.slnx --no-build -c Release
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./test-results
          --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results
          if-no-files-found: warn

  frontend-build-test:
    name: Frontend build & test (${{ matrix.frontend }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        frontend:
          - frontends/Pronto.BillerPayments.Pwa
          - frontends/Pronto.BillerExperience.Studio
    defaults:
      run:
        working-directory: ${{ matrix.frontend }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ${{ matrix.frontend }}/package-lock.json

      - name: Install
        run: npm ci

      - name: Build (typecheck + bundle)
        run: npm run build

      - name: Test
        run: npm test

  frontend-ui-e2e:
    name: Frontend UI E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            frontends/Pronto.BillerPayments.Pwa/package-lock.json
            frontends/Pronto.BillerExperience.Studio/package-lock.json

      # Both frontends are needed: the Studio E2E builds and serves the real payer PWA to embed it
      # in the preview iframe (the exact blank-preview regression these tests guard against).
      - name: Install PWA deps
        working-directory: frontends/Pronto.BillerPayments.Pwa
        run: npm ci

      - name: Install Studio deps
        working-directory: frontends/Pronto.BillerExperience.Studio
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontends/Pronto.BillerPayments.Pwa
        run: npx playwright install --with-deps chromium

      - name: Payer PWA UI E2E
        working-directory: frontends/Pronto.BillerPayments.Pwa
        run: npm run test:e2e

      - name: Studio UI E2E (embeds the real payer PWA)
        working-directory: frontends/Pronto.BillerExperience.Studio
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-artifacts
          path: |
            frontends/Pronto.BillerPayments.Pwa/test-results
            frontends/Pronto.BillerExperience.Studio/test-results
          if-no-files-found: ignore

  payer-experience-builder:
    name: Payer Experience Builder (gates)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontends/Pronto.PayerExperience.Builder
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontends/Pronto.PayerExperience.Builder/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # Unit tests (F5 containment gate/CSP/manifest + F6 contract-gate rule evaluation). They
      # read the sibling PWA source directly and need no browser; the browser-driven fixture
      # e2e and the full generate->build->validate->contract-gate path run in the deployment
      # build Job.
      - name: Test
        run: npm test

  compliance-definition:
    name: Compliance agent definition
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pinned Foundry SDK
        run: pip install azure-ai-projects==2.3.0 azure-identity==1.25.1

      - name: Validate compliance definition
        run: |
          python -m json.tool agents/compliance/tools.json > /dev/null
          python -m py_compile scripts/index-compliance-knowledge.py
          python scripts/index-compliance-knowledge.py --dry-run
