name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Pronto.slnx

      - name: Build
        run: dotnet build Pronto.slnx --no-restore -c Release

      - name: Test
        run: >
          dotnet test Pronto.slnx --no-build -c Release
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./test-results
          --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results
          if-no-files-found: warn

  frontend-build-test:
    name: Frontend build & test (${{ matrix.frontend }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        frontend:
          - frontends/Pronto.BillerPayments.Pwa
          - frontends/Pronto.BillerExperience.Studio
    defaults:
      run:
        working-directory: ${{ matrix.frontend }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ${{ matrix.frontend }}/package-lock.json

      - name: Install
        run: npm ci

      - name: Build (typecheck + bundle)
        run: npm run build

      - name: Test
        run: npm test
