# Proof-of-life HTTPRoute. There is no real biller backend yet, so this routes to
# a service name that does not exist. kgateway/Envoy still accepts the route and
# answers requests to the Gateway hostname with an error (observed: HTTP 500,
# server: envoy, since the backend Service can't be resolved) instead of a
# connection failure. That's sufficient to prove the Gateway itself is up, its
# hostname resolves publicly, and it is serving HTTP. Delete or replace this once
# a real HTTPRoute/biller-{slug} exists (see README.md at the repo root for that
# shape).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: placeholder
  namespace: kgateway-system
spec:
  parentRefs:
    - name: ic-gateway
      namespace: kgateway-system
  rules:
    - backendRefs:
        - name: placeholder-backend
          port: 8080
