# Public HTTP Gateway for the ic cluster. Uses the kgateway GatewayClass that the
# kgateway Helm chart installs automatically (controllerName: kgateway.dev/kgateway).
# References the GatewayParameters in gateway-parameters.yaml so the generated
# Service gets the Azure DNS label annotation.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ic-gateway
  namespace: kgateway-system
spec:
  gatewayClassName: kgateway
  infrastructure:
    parametersRef:
      name: ic-hack-gw-params
      group: gateway.kgateway.dev
      kind: GatewayParameters
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
