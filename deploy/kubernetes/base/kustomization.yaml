apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Shared, namespace-agnostic definitions for the deterministic backend API services
# (Invoice, Payment, PayerAccount). Namespace and image tags are set by the overlays
# under ../overlays.
#
# The Biller Experience components (API, Worker, Studio, PWA) are intentionally NOT
# here: they are deployed through their own rendered manifest,
# biller-experience.template.yaml, which wires their Cosmos/AI-Foundry/blob config and
# workload identity (federated only to system:serviceaccount:ic:ic-workload) and owns
# the `app.kubernetes.io/name` selector + the `/api`, `/studio`, `/pay` routes. CI
# still builds and pushes their images.
resources:
  - service-account.yaml
  - invoice-api/deployment.yaml
  - invoice-api/service.yaml
  - payment-api/deployment.yaml
  - payment-api/service.yaml
  - payer-account-api/deployment.yaml
  - payer-account-api/service.yaml
