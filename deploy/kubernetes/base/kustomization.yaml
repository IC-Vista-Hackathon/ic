apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Shared, namespace-agnostic definitions for the IC control-plane services.
# Namespace and image tags are set by the overlays under ../overlays.
resources:
  - service-account.yaml
  - biller-experience-api/deployment.yaml
  - biller-experience-api/service.yaml
  - biller-experience-worker/deployment.yaml
  - invoice-api/deployment.yaml
  - invoice-api/service.yaml
  - payment-api/deployment.yaml
  - payment-api/service.yaml
  - payer-account-api/deployment.yaml
  - payer-account-api/service.yaml
