apiVersion: apps/v1
kind: Deployment
metadata:
  name: ic-payment-api
  labels:
    app: ic-payment-api
    app.kubernetes.io/part-of: ic
spec:
  # In-memory stores: replicas MUST stay 1 until Cosmos lands — with 2+, seeds
  # land on one pod and lookups hit the other.
  replicas: 1
  selector:
    matchLabels:
      app: ic-payment-api
  template:
    metadata:
      labels:
        app: ic-payment-api
    spec:
      serviceAccountName: ic-workload
      containers:
        - name: payment-api
          image: acrichackjk4zmntatjem4.azurecr.io/ic-payment-api:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            # In-cluster Invoice Service. Namespace-relative name so nonprod
            # (ic-nonprod) and prod (ic) each resolve to their own invoice API.
            - name: Services__InvoiceApi
              value: http://ic-invoice-api:8080
            - name: Services__BillerExperienceApi
              value: http://ic-biller-experience-api:8080
            - name: Services__PayerAccountApi
              value: http://ic-payer-account-api:8080
            - name: PurchaseWorkflow__BackgroundCompletionEnabled
              value: "true"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
