apiVersion: apps/v1
kind: Deployment
metadata:
  name: ic-biller-experience-api
  labels:
    app: ic-biller-experience-api
    app.kubernetes.io/part-of: ic
spec:
  # In-memory stores: replicas MUST stay 1 until Cosmos lands — with 2+, writes
  # land on one pod and reads hit the other.
  replicas: 1
  selector:
    matchLabels:
      app: ic-biller-experience-api
  template:
    metadata:
      labels:
        app: ic-biller-experience-api
    spec:
      serviceAccountName: ic-workload
      containers:
        - name: biller-experience-api
          image: acrichackjk4zmntatjem4.azurecr.io/ic-biller-experience-api:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: BillerExperience__SupportingServices__InvoiceBaseUrl
              value: http://ic-invoice-api:8080/
            - name: BillerExperience__SupportingServices__PaymentBaseUrl
              value: http://ic-payment-api:8080/
            - name: BillerExperience__SupportingServices__PayerAccountBaseUrl
              value: http://ic-payer-account-api:8080/
            # Signed compliance attestations require a real, non-default HMAC key outside
            # Development (enforced at startup). The key is a per-namespace secret generated
            # once by the deploy workflow (never committed), so it stays stable across deploys
            # — attestations persisted with a revision remain verifiable later.
            - name: BillerExperience__Compliance__AttestationSigningKey
              valueFrom:
                secretKeyRef:
                  name: ic-compliance-attestation
                  key: signing-key
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
