apiVersion: apps/v1
kind: Deployment
metadata:
  name: ic-biller-experience-api
  labels:
    app: ic-biller-experience-api
    app.kubernetes.io/part-of: ic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ic-biller-experience-api
  template:
    metadata:
      labels:
        app: ic-biller-experience-api
    spec:
      serviceAccountName: ic-workload
      containers:
        - name: biller-experience-api
          image: acrichackjk4zmntatjem4.azurecr.io/ic-biller-experience-api:latest
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
