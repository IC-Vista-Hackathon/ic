apiVersion: apps/v1
kind: Deployment
metadata:
  name: ic-invoice-api
  labels:
    app: ic-invoice-api
    app.kubernetes.io/part-of: ic
spec:
  # Cosmos-backed persistence (partition /biller_id) — state is shared, so this is
  # safe to scale; kept at 1 for the sandbox.
  replicas: 1
  selector:
    matchLabels:
      app: ic-invoice-api
  template:
    metadata:
      labels:
        app: ic-invoice-api
        # Opt this pod into the AKS workload-identity webhook (federated token for Cosmos).
        azure.workload.identity/use: "true"
    spec:
      # Platform-provisioned SA (federated to the workload UAMI); authenticates to
      # Cosmos via DefaultAzureCredential — no connection strings or keys.
      serviceAccountName: ic-workload
      containers:
        - name: invoice-api
          image: acrichackjk4zmntatjem4.azurecr.io/ic-invoice-api:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            # Cosmos SQL account (public endpoint; auth is workload identity, not keys).
            - name: Persistence__Provider
              value: Cosmos
            - name: Persistence__CosmosEndpoint
              value: https://cosmos-ic-hack-jk4zmntatjem4.documents.azure.com:443/
            - name: Persistence__DatabaseName
              value: ic
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
