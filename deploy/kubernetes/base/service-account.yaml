# Platform service account, federated to the workload UAMI (infra/bicep's
# workloadIdentityClientId output). The namespace is set per-overlay by kustomize.
# client-id below is uami-ic-hack-workload's clientId -- if that identity is ever
# recreated, update this to match.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ic-workload
  annotations:
    azure.workload.identity/client-id: "12fe469e-b4ee-4293-a535-e4ff1ae45c24"
  labels:
    azure.workload.identity/use: "true"
