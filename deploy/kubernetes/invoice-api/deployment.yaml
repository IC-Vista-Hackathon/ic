apiVersion: apps/v1
kind: Deployment
metadata:
  name: ic-invoice-api
  namespace: ic
  labels:
    app: ic-invoice-api
    app.kubernetes.io/part-of: ic
spec:
  # In-memory stores: replicas MUST stay 1 until Cosmos lands — with 2+, seeds
  # land on one pod and lookups hit the other (verified live 2026-07-14).
  replicas: 1
  selector:
    matchLabels:
      app: ic-invoice-api
  template:
    metadata:
      labels:
        app: ic-invoice-api
    spec:
      # Platform-provisioned SA (federated to the workload UAMI). No Azure
      # dependency yet, so the workload-identity pod label is intentionally
      # omitted until the service talks to Cosmos.
      serviceAccountName: ic-workload
      containers:
        - name: invoice-api
          # Immutable release tag (git short SHA) — see deploy/kubernetes/README.md.
          image: acrichackjk4zmntatjem4.azurecr.io/ic-invoice-api:7f853a2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          # Endpoints added in IC.Invoice.Api specifically for k8s probing.
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
