# Exposure via the existing kgateway Gateway API controller (not classic Ingress).
# Attaches to the shared ic-gateway (public LB / DNS ic-hack.eastus2.cloudapp.azure.com)
# on its :80 HTTP listener.
#
# Follows the platform's path-based convention (mirrors ic-biller-experience:
# /api, /studio and biller-sites: /pay): a path prefix is routed to the service
# and stripped via URLRewrite so the backend receives its normal paths.
#
# Reachable at:  http://ic-hack.eastus2.cloudapp.azure.com/invoices/...
#   e.g. POST /invoices/billers/{billerId}/invoices/seed
#        -> rewritten to /billers/{billerId}/invoices/seed at the service
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ic-invoice-api
  namespace: ic
  labels:
    app: ic-invoice-api
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ic-gateway
      namespace: kgateway-system
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /invoices
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - group: ""
          kind: Service
          name: ic-invoice-api
          port: 8080
