# Exposure via the shared ic-gateway (kgateway, Gateway API), same as invoice-api.
#
# Unlike /invoices (which strips its prefix), the Payment Service's own routes ARE
# /payments and /purchases per design/contracts.md, so both prefixes route through
# with no URLRewrite:
#   POST http://ic-hack.eastus2.cloudapp.azure.com/payments   -> /payments at the service
#   POST http://ic-hack.eastus2.cloudapp.azure.com/purchases  -> /purchases at the service
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ic-payment-api
  namespace: ic
  labels:
    app: ic-payment-api
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ic-gateway
      namespace: kgateway-system
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /payments
        - path:
            type: PathPrefix
            value: /purchases
      backendRefs:
        - group: ""
          kind: Service
          name: ic-payment-api
          port: 8080
