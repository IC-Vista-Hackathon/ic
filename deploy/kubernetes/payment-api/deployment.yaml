apiVersion: apps/v1
kind: Deployment
metadata:
  name: ic-payment-api
  namespace: ic
  labels:
    app: ic-payment-api
    app.kubernetes.io/part-of: ic
spec:
  # In-memory stores: replicas MUST stay 1 until Cosmos lands — with 2+, seeds
  # land on one pod and lookups hit the other (verified live 2026-07-14).
  replicas: 1
  selector:
    matchLabels:
      app: ic-payment-api
  template:
    metadata:
      labels:
        app: ic-payment-api
    spec:
      # Platform-provisioned SA (federated to the workload UAMI). No Azure
      # dependency yet — in-memory stores; Cosmos comes later.
      serviceAccountName: ic-workload
      containers:
        - name: payment-api
          image: acrichackjk4zmntatjem4.azurecr.io/ic-payment-api:v1
          ports:
            - name: http
              containerPort: 8080
          env:
            # In-cluster Invoice Service (replaces the localhost dev default).
            - name: Services__InvoiceApi
              value: http://ic-invoice-api.ic.svc.cluster.local:8080
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
