# Least-privilege RBAC for IC.BillerExperience.Worker, scoped entirely to the biller-sites
# namespace. Grants only the verbs and resource types the publishing worker needs to manage
# biller-{slug} workloads (see README.md's "AKS publication model"): no cluster-admin, no
# access to any other namespace, no access to any other resource type.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: biller-publisher
  namespace: biller-sites
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# Cross-namespace binding: the subject ServiceAccount lives in ic, the Role and RoleBinding live in
# biller-sites. This is standard Kubernetes RBAC -- a RoleBinding's subject may reference a
# ServiceAccount from any namespace, while the permissions it grants remain confined to the
# RoleBinding's own namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: biller-publisher
  namespace: biller-sites
subjects:
  - kind: ServiceAccount
    name: biller-publisher
    namespace: ic
roleRef:
  kind: Role
  name: biller-publisher
  apiGroup: rbac.authorization.k8s.io
