apiVersion: apps/v1
kind: Deployment
metadata:
  name: ic-biller-experience-api
  namespace: ic
  labels: { app.kubernetes.io/name: ic-biller-experience-api, app.kubernetes.io/part-of: ic-biller-experience }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: ic-biller-experience-api }
  template:
    metadata:
      labels: { app.kubernetes.io/name: ic-biller-experience-api, app.kubernetes.io/part-of: ic-biller-experience, azure.workload.identity/use: "true" }
    spec:
      serviceAccountName: ic-workload
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: api
          image: ${ACR_LOGIN_SERVER}/ic-biller-experience-api:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports: [{ name: http, containerPort: 8080 }]
          env:
            - { name: ASPNETCORE_URLS, value: "http://+:8080" }
            - { name: BillerExperience__Persistence__Provider, value: Cosmos }
            - { name: BillerExperience__Persistence__CosmosEndpoint, value: "${COSMOS_ENDPOINT}" }
            - { name: BillerExperience__Persistence__DatabaseName, value: ic }
            - { name: BillerExperience__Model__Provider, value: AzureAI }
            - { name: BillerExperience__Model__Endpoint, value: "${AI_FOUNDRY_ENDPOINT}" }
            - { name: BillerExperience__Model__Deployment, value: gpt-5.4-mini }
            - { name: APPLICATIONINSIGHTS_CONNECTION_STRING, value: "${APPLICATIONINSIGHTS_CONNECTION_STRING}" }
          readinessProbe: { httpGet: { path: /health/ready, port: http }, initialDelaySeconds: 5, periodSeconds: 5 }
          livenessProbe: { httpGet: { path: /health/live, port: http }, initialDelaySeconds: 10, periodSeconds: 10 }
          resources:
            requests: { cpu: 100m, memory: 192Mi }
            limits: { cpu: 500m, memory: 512Mi }
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: ["ALL"] } }
---
apiVersion: v1
kind: Service
metadata: { name: ic-biller-experience-api, namespace: ic }
spec:
  selector: { app.kubernetes.io/name: ic-biller-experience-api }
  ports: [{ name: http, port: 8080, targetPort: http }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ic-biller-experience-worker
  namespace: ic
  labels: { app.kubernetes.io/name: ic-biller-experience-worker, app.kubernetes.io/part-of: ic-biller-experience }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: ic-biller-experience-worker }
  template:
    metadata:
      labels: { app.kubernetes.io/name: ic-biller-experience-worker, app.kubernetes.io/part-of: ic-biller-experience }
    spec:
      serviceAccountName: biller-publisher
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: worker
          image: ${ACR_LOGIN_SERVER}/ic-biller-experience-worker:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports: [{ name: http, containerPort: 8080 }]
          env:
            - { name: ASPNETCORE_URLS, value: "http://+:8080" }
            - { name: APPLICATIONINSIGHTS_CONNECTION_STRING, value: "${APPLICATIONINSIGHTS_CONNECTION_STRING}" }
          readinessProbe: { httpGet: { path: /health/ready, port: http }, initialDelaySeconds: 5, periodSeconds: 5 }
          livenessProbe: { httpGet: { path: /health/live, port: http }, initialDelaySeconds: 10, periodSeconds: 10 }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 250m, memory: 256Mi }
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: ["ALL"] } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ic-biller-experience-studio
  namespace: ic
  labels: { app.kubernetes.io/name: ic-biller-experience-studio, app.kubernetes.io/part-of: ic-biller-experience }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: ic-biller-experience-studio }
  template:
    metadata:
      labels: { app.kubernetes.io/name: ic-biller-experience-studio, app.kubernetes.io/part-of: ic-biller-experience }
    spec:
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: studio
          image: ${ACR_LOGIN_SERVER}/ic-biller-experience-studio:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports: [{ name: http, containerPort: 8080 }]
          readinessProbe: { httpGet: { path: /health/ready, port: http }, initialDelaySeconds: 2, periodSeconds: 5 }
          livenessProbe: { httpGet: { path: /health/live, port: http }, initialDelaySeconds: 5, periodSeconds: 10 }
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { cpu: 100m, memory: 64Mi }
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: ["ALL"] } }
---
apiVersion: v1
kind: Service
metadata: { name: ic-biller-experience-studio, namespace: ic }
spec:
  selector: { app.kubernetes.io/name: ic-biller-experience-studio }
  ports: [{ name: http, port: 8080, targetPort: http }]
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: { name: ic-biller-experience, namespace: ic }
spec:
  parentRefs: [{ name: ic-gateway, namespace: kgateway-system, sectionName: http }]
  rules:
    - matches: [{ path: { type: Exact, value: / } }]
      filters:
        - type: RequestRedirect
          requestRedirect: { path: { type: ReplaceFullPath, replaceFullPath: /studio/ }, statusCode: 302 }
    - matches: [{ path: { type: PathPrefix, value: /api } }]
      filters:
        - type: URLRewrite
          urlRewrite: { path: { type: ReplacePrefixMatch, replacePrefixMatch: / } }
      backendRefs: [{ name: ic-biller-experience-api, port: 8080 }]
    - matches: [{ path: { type: PathPrefix, value: /studio } }]
      filters:
        - type: URLRewrite
          urlRewrite: { path: { type: ReplacePrefixMatch, replacePrefixMatch: / } }
      backendRefs: [{ name: ic-biller-experience-studio, port: 8080 }]
---
