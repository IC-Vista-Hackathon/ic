# Prod-only patch: turn the base in-memory ic-biller-experience-api into the live,
# Azure-backed deployment. The base keeps the plain in-memory variant (used by
# ic-nonprod, which has no federated workload identity). This patch adds:
#   * Cosmos persistence + AI Foundry model + published-experience blob storage
#     (all non-secret sandbox endpoints, same values documented in .env.example)
#   * the workload-identity pod label so the AKS webhook injects a federated token
#     for the ic-workload service account
# Application Insights is injected after apply by the deploy workflow so this checked-in
# overlay remains directly renderable and safe to apply without secret substitution.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ic-biller-experience-api
  labels:
    app.kubernetes.io/name: ic-biller-experience-api
    app.kubernetes.io/part-of: ic-biller-experience
spec:
  selector:
    matchLabels:
      $patch: replace
      app.kubernetes.io/name: ic-biller-experience-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ic-biller-experience-api
        app.kubernetes.io/part-of: ic-biller-experience
        azure.workload.identity/use: "true"
    spec:
      containers:
        - name: biller-experience-api
          env:
            - { name: BillerExperience__Persistence__Provider, value: Cosmos }
            - { name: BillerExperience__Persistence__CosmosEndpoint, value: "https://cosmos-ic-hack-jk4zmntatjem4.documents.azure.com:443/" }
            - { name: BillerExperience__Persistence__DatabaseName, value: ic }
            - { name: BillerExperience__Model__Provider, value: AzureAI }
            - { name: BillerExperience__Model__Endpoint, value: "https://aif-ic-hack-jk4zmntatjem4.cognitiveservices.azure.com/" }
            - { name: BillerExperience__Model__Deployment, value: gpt-5.4-mini }
            - { name: BillerExperience__Research__FoundryProjectEndpoint, value: "https://aif-ic-hack-jk4zmntatjem4.services.ai.azure.com/api/projects/ic" }
            - { name: BillerExperience__Research__CoordinatorAgentId, value: research-coordinator }
            - { name: BillerExperience__AgentProvisioning__Enabled, value: "true" }
            - { name: BillerExperience__Compliance__FoundryAgentId, value: biller-compliance }
            - { name: BillerExperience__Compliance__RequireFoundryEvidence, value: "true" }
            - { name: BillerExperience__Compliance__PolicyVersion, value: "2026-07-15" }
            - { name: BillerExperience__AgentProvisioning__McpConnectionId, value: ic-shared-context-mcp }
            # Hackathon demo: MCP uses the HTTP-only Gateway but retains API-key authentication
            # and short-lived biller/run/agent capability authorization.
            - { name: BillerExperience__Mcp__Enabled, value: "true" }
            - { name: BillerExperience__Mcp__PublicEndpoint, value: "http://pronto.eastus2.cloudapp.azure.com/mcp" }
            - name: BillerExperience__Mcp__ApiKey
              valueFrom:
                secretKeyRef:
                  name: ic-agent-mcp
                  key: api-key
            - name: BillerExperience__Mcp__CapabilitySigningKey
              valueFrom:
                secretKeyRef:
                  name: ic-agent-mcp
                  key: capability-signing-key
            - { name: BillerExperience__PublishedExperience__StorageEndpoint, value: "https://stichackjk4zmntatjem4.blob.core.windows.net/" }
            - { name: BillerExperience__PublishedExperience__ContainerName, value: payer-experiences }
            - { name: BillerExperience__SupportingServices__InvoiceBaseUrl, value: "http://ic-invoice-api.ic.svc.cluster.local:8080/" }
