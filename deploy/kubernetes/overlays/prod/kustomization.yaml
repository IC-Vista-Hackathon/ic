apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Production environment: the shared `ic` namespace on aks-ic-hack, publicly
# exposed through the kgateway Gateway. Deployed on merge to `main`.
namespace: ic

resources:
  - namespace.yaml
  - ../../base
  - httproutes.yaml

# Cosmos-backed persistence + workload-identity opt-in for the foundation services.
# Prod-only: the workload identity is federated to system:serviceaccount:ic:ic-workload,
# so only this namespace can authenticate to Cosmos. nonprod uses the base InMemory default.
patches:
  - path: cosmos-persistence.yaml

# `kustomize edit set image <name>=<name>:<sha>` in the deploy workflow pins every
# image to the merged commit's immutable tag. `latest` here is only a placeholder.
images:
  - name: acrichackjk4zmntatjem4.azurecr.io/ic-biller-experience-api
    newTag: latest
  - name: acrichackjk4zmntatjem4.azurecr.io/ic-invoice-api
    newTag: latest
  - name: acrichackjk4zmntatjem4.azurecr.io/ic-payment-api
    newTag: latest
  - name: acrichackjk4zmntatjem4.azurecr.io/ic-payer-account-api
    newTag: latest
