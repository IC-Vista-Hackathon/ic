# Cosmos-backed persistence for the foundation services — prod (`ic`) only.
# The workload identity is federated solely to system:serviceaccount:ic:ic-workload
# (infra/bicep/modules/aks.bicep), so only the prod namespace can obtain a Cosmos
# token via DefaultAzureCredential. nonprod falls back to the base InMemory default.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ic-invoice-api
spec:
  template:
    metadata:
      labels:
        # Opt this pod into the AKS workload-identity webhook (federated token for Cosmos).
        azure.workload.identity/use: "true"
    spec:
      containers:
        - name: invoice-api
          env:
            - name: Persistence__Provider
              value: Cosmos
            - name: Persistence__CosmosEndpoint
              value: https://cosmos-ic-hack-jk4zmntatjem4.documents.azure.com:443/
            - name: Persistence__DatabaseName
              value: ic
---
