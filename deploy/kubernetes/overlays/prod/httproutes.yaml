# Public exposure for the production control-plane APIs via the shared kgateway
# Gateway (ic-gateway in kgateway-system, public LB / DNS
# pronto.eastus2.cloudapp.azure.com). Each API gets a path prefix that is
# stripped via URLRewrite where the backend expects root paths.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ic-invoice-api
  labels:
    app: ic-invoice-api
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ic-gateway
      namespace: kgateway-system
      sectionName: http
  rules:
    # Preserve /mcp for Foundry remote-tool requests. The API validates the project connection's
    # X-IC-MCP-Key and a scoped capability token before serving context tools.
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - group: ""
          kind: Service
          name: ic-biller-experience-api
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /invoices
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - group: ""
          kind: Service
          name: ic-invoice-api
          port: 8080
---
# The Payment Service's own routes ARE /payments and /purchases
# (design/contracts.md), so both prefixes route through with no URLRewrite.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ic-payment-api
  labels:
    app: ic-payment-api
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ic-gateway
      namespace: kgateway-system
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /payments
        - path:
            type: PathPrefix
            value: /purchases
      backendRefs:
        - group: ""
          kind: Service
          name: ic-payment-api
          port: 8080
---
# The Payer Account Service's own route IS /payers (design/contracts.md), so the
# prefix routes through with no URLRewrite.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ic-payer-account-api
  labels:
    app: ic-payer-account-api
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ic-gateway
      namespace: kgateway-system
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /payers
      backendRefs:
        - group: ""
          kind: Service
          name: ic-payer-account-api
          port: 8080
---
# Keep the existing combined Biller Experience route identity so Kustomize updates
# the live route in place instead of creating overlapping route resources.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ic-biller-experience
  labels:
    app.kubernetes.io/part-of: ic-biller-experience
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ic-gateway
      namespace: kgateway-system
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      # Agent orchestration streams progress separately and can legitimately exceed Envoy's
      # 15-second default while Foundry workers consolidate. Zero disables the route timeout.
      timeouts:
        request: "0s"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - group: ""
          kind: Service
          name: ic-biller-experience-api
          port: 8080
    - matches:
        - path:
            type: Exact
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /studio/
            statusCode: 302
    - matches:
        - path:
            type: PathPrefix
            value: /studio
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - group: ""
          kind: Service
          name: ic-biller-experience-studio
          port: 8080
    # Studio preview embeds the SAME shipped payer PWA at /pay/?preview=<id> — with no
    # published slug — so the router (which resolves a published biller from /pay/{slug}
    # in blob storage) can't serve it and 404s, leaving the preview iframe blank. Serve
    # the standalone PWA build (ic-biller-payments-pwa, base /pay/) for the SPA shell and
    # its build artifacts, and keep published /pay/{slug} traffic on the router below.
    # A published biller's own assets are served by the router under /pay/{slug}/assets/...,
    # so they carry the slug and never match these reserved /pay/{asset} paths.
    - matches:
        - path: { type: Exact, value: /pay/ }
        - path: { type: Exact, value: /pay }
      filters:
        - type: URLRewrite
          urlRewrite:
            path: { type: ReplaceFullPath, replaceFullPath: /index.html }
      backendRefs:
        - group: ""
          kind: Service
          name: ic-biller-payments-pwa
          port: 8080
    - matches:
        - path: { type: PathPrefix, value: /pay/assets }
      filters:
        - type: URLRewrite
          urlRewrite:
            path: { type: ReplacePrefixMatch, replacePrefixMatch: /assets }
      backendRefs:
        - group: ""
          kind: Service
          name: ic-biller-payments-pwa
          port: 8080
    - matches:
        - path: { type: Exact, value: /pay/sw.js }
      filters:
        - type: URLRewrite
          urlRewrite:
            path: { type: ReplaceFullPath, replaceFullPath: /sw.js }
      backendRefs:
        - group: ""
          kind: Service
          name: ic-biller-payments-pwa
          port: 8080
    - matches:
        - path: { type: Exact, value: /pay/manifest.webmanifest }
      filters:
        - type: URLRewrite
          urlRewrite:
            path: { type: ReplaceFullPath, replaceFullPath: /manifest.webmanifest }
      backendRefs:
        - group: ""
          kind: Service
          name: ic-biller-payments-pwa
          port: 8080
    - matches:
        - path: { type: Exact, value: /pay/config.json }
      filters:
        - type: URLRewrite
          urlRewrite:
            path: { type: ReplaceFullPath, replaceFullPath: /config.json }
      backendRefs:
        - group: ""
          kind: Service
          name: ic-biller-payments-pwa
          port: 8080
    # The router needs the full /pay/{slug}/... path to resolve the biller and blob
    # key, so this rule intentionally does NOT rewrite the prefix (unlike the API routes).
    - matches:
        - path:
            type: PathPrefix
            value: /pay
      backendRefs:
        - group: ""
          kind: Service
          name: ic-payer-experience-router
          port: 8080
