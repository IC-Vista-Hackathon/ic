---
# Shared Payer Experience router: resolves the biller from /pay/{slug} and serves that
# biller's published static bundle straight from the payer-experiences blob container.
# Reads blob with workload identity (ic-workload has Storage Blob Data Contributor), so
# one router replaces the old per-biller Deployments. Stateless — safe to scale out.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ic-payer-experience-router
  labels:
    app.kubernetes.io/name: ic-payer-experience-router
    app.kubernetes.io/part-of: ic-biller-experience
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ic-payer-experience-router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ic-payer-experience-router
        app.kubernetes.io/part-of: ic-biller-experience
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: ic-workload
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: router
          image: acrichackjk4zmntatjem4.azurecr.io/ic-payer-experience-router:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - { name: ASPNETCORE_URLS, value: "http://+:8080" }
            - { name: Router__StorageEndpoint, value: "https://stichackjk4zmntatjem4.blob.core.windows.net/" }
            - { name: Router__ContainerName, value: payer-experiences }
            - { name: APPLICATIONINSIGHTS_CONNECTION_STRING, value: "${APPLICATIONINSIGHTS_CONNECTION_STRING}" }
          readinessProbe:
            httpGet: { path: /health/ready, port: http }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health/live, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits: { cpu: 250m, memory: 128Mi }
          securityContext:
            runAsNonRoot: true
            runAsUser: 1654
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: ic-payer-experience-router
spec:
  selector:
    app.kubernetes.io/name: ic-payer-experience-router
  ports:
    - name: http
      port: 8080
      targetPort: http
