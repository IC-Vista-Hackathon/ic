# Biller Experience stack that only runs in prod (the shared `ic` namespace).
#
# The Worker and the Cosmos/AI-backed API authenticate to Azure through workload
# identity, which is federated ONLY to `system:serviceaccount:ic:ic-workload` and
# `system:serviceaccount:ic:biller-publisher` (see infra/bicep, and the
# `az identity federated-credential` list). Those subjects are namespace-scoped to
# `ic`, so this stack is intentionally NOT in the shared base and NOT deployed to
# `ic-nonprod` — nonprod has no federated identity and keeps the in-memory API from
# the base overlay. This file (plus the env patch and the studio/pwa/pay HTTPRoutes)
# replaces the hand-applied biller-experience.template.yaml so `kubectl apply -k` now
# reproduces live prod instead of regressing it.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: biller-publisher
  annotations:
    # infra/bicep publisherIdentityClientId (uami-ic-hack-publisher). Update if recreated.
    azure.workload.identity/client-id: "ec6aaa8e-1176-475f-8e66-11494a0fe4e0"
  labels:
    azure.workload.identity/use: "true"
---
# Lets the Worker (biller-publisher) launch and watch per-biller bundle build Jobs, and read
# their pods/logs for diagnostics. Namespace-scoped and limited to Jobs + pod reads — no
# cluster-wide access, no permission to touch other workloads.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ic-bundle-build-runner
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs/status"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ic-bundle-build-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ic-bundle-build-runner
subjects:
  - kind: ServiceAccount
    name: biller-publisher
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ic-biller-experience-worker
  labels:
    app.kubernetes.io/name: ic-biller-experience-worker
    app.kubernetes.io/part-of: ic-biller-experience
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ic-biller-experience-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ic-biller-experience-worker
        app.kubernetes.io/part-of: ic-biller-experience
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: biller-publisher
      containers:
        - name: worker
          image: acrichackjk4zmntatjem4.azurecr.io/ic-biller-experience-worker:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - { name: ASPNETCORE_URLS, value: "http://+:8080" }
            - { name: Publication__CosmosEndpoint, value: "https://cosmos-ic-hack-jk4zmntatjem4.documents.azure.com:443/" }
            - { name: Publication__DatabaseName, value: ic }
            - { name: Publication__StorageEndpoint, value: "https://stichackjk4zmntatjem4.blob.core.windows.net/" }
            - { name: Publication__ContainerName, value: payer-experiences }
            - { name: Publication__PublicBaseUrl, value: "http://pronto.eastus2.cloudapp.azure.com/" }
            # Bundle build Job: setting BuilderImage enables the generate→build→validate→publish
            # Job per publication; empty keeps config-only publishing. The Job runs as
            # biller-publisher (same workload identity that writes blobs).
            # ${BUILDER_IMAGE_TAG} is substituted with the merged SHA by the deploy workflow
            # (kustomize's image transformer only rewrites container image: fields, not env).
            - { name: BundleBuild__BuilderImage, value: "acrichackjk4zmntatjem4.azurecr.io/ic-payer-experience-builder:${BUILDER_IMAGE_TAG}" }
            - { name: BundleBuild__ServiceAccountName, value: biller-publisher }
            - { name: BundleBuild__GeneratorMode, value: deterministic }
            - name: BundleBuild__Namespace
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Resolved from Azure and substituted by the deploy workflow (envsubst); empty
            # locally, in which case the service simply does not export to Azure Monitor.
            - { name: APPLICATIONINSIGHTS_CONNECTION_STRING, value: "${APPLICATIONINSIGHTS_CONNECTION_STRING}" }
          readinessProbe:
            httpGet: { path: /health/ready, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health/live, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 250m, memory: 256Mi }
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
