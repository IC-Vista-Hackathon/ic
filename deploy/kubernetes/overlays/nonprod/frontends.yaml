# Static frontends (Studio + Payments PWA) for nonprod, so per-PR nonprod serves the
# full UI like prod instead of just the APIs. These are stateless nginx containers
# with no Azure dependency, so — unlike the Worker/Cosmos-backed API — they need no
# workload identity and are safe to run in ic-nonprod. The Worker stays prod-only
# (its Cosmos/blob access is federated to the `ic` namespace only).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ic-biller-experience-studio
  labels:
    app.kubernetes.io/name: ic-biller-experience-studio
    app.kubernetes.io/part-of: ic-biller-experience
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ic-biller-experience-studio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ic-biller-experience-studio
        app.kubernetes.io/part-of: ic-biller-experience
    spec:
      containers:
        - name: studio
          image: acrichackjk4zmntatjem4.azurecr.io/ic-biller-experience-studio:latest
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet: { path: /health/ready, port: http }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health/live, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { cpu: 100m, memory: 64Mi }
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: ic-biller-experience-studio
spec:
  selector:
    app.kubernetes.io/name: ic-biller-experience-studio
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ic-biller-payments-pwa
  labels:
    app.kubernetes.io/name: ic-biller-payments-pwa
    app.kubernetes.io/part-of: ic-biller-experience
spec:
  # Stateless static renderer — safe to run multiple replicas.
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ic-biller-payments-pwa
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ic-biller-payments-pwa
        app.kubernetes.io/part-of: ic-biller-experience
    spec:
      containers:
        - name: pwa
          image: acrichackjk4zmntatjem4.azurecr.io/ic-biller-payments-pwa:latest
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet: { path: /health/ready, port: http }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health/live, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { cpu: 100m, memory: 64Mi }
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: ic-biller-payments-pwa
spec:
  selector:
    app.kubernetes.io/name: ic-biller-payments-pwa
  ports:
    - name: http
      port: 8080
      targetPort: http
