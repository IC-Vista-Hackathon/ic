# Dedicated public Gateway for nonprod, isolated from prod. kgateway provisions a
# separate Azure LoadBalancer for it; the azure-dns-label-name annotation registers
# an instantly-resolvable hostname in Azure's own DNS (no external DNS purchase):
#
#   ic-hack-nonprod.eastus2.cloudapp.azure.com
#
# Prod keeps its own Gateway (pronto.eastus2.cloudapp.azure.com) in kgateway-system,
# so the two environments never share a load balancer, hostname, or route path.
# Both Gateway and GatewayParameters live in ic-nonprod (namespaced by the overlay).
apiVersion: gateway.kgateway.dev/v1alpha1
kind: GatewayParameters
metadata:
  name: ic-hack-nonprod-gw-params
spec:
  kube:
    service:
      type: LoadBalancer
      extraAnnotations:
        service.beta.kubernetes.io/azure-dns-label-name: ic-hack-nonprod
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ic-nonprod-gateway
spec:
  gatewayClassName: kgateway
  infrastructure:
    parametersRef:
      name: ic-hack-nonprod-gw-params
      group: gateway.kgateway.dev
      kind: GatewayParameters
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
