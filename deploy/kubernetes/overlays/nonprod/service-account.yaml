# Nonprod override for the ic-workload service account (base/service-account.yaml).
# In ic-nonprod this account federates to the DEDICATED nonprod identity
# (uami-ic-hack-nonprod-workload), NOT the shared prod identity. This is the data-plane
# isolation boundary: a nonprod pod's token can reach the nonprod Cosmos account only, never
# prod Cosmos.
#
# The client-id below MUST be uami-ic-hack-nonprod-workload's clientId — the
# `nonprodWorkloadIdentityClientId` output of infra/bicep/main.bicep. It is a GUID that Azure
# assigns when the identity is created, so it cannot be known until the Bicep is applied. After a
# human applies main.bicep (see PR description), set this to the output value:
#   az deployment sub show --name ic-hack \
#     --query 'properties.outputs.nonprodWorkloadIdentityClientId.value' -o tsv
# Update this if the identity is ever recreated.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ic-workload
  annotations:
    # PLACEHOLDER — replace with nonprodWorkloadIdentityClientId after applying main.bicep.
    azure.workload.identity/client-id: "REPLACE_WITH_NONPROD_WORKLOAD_IDENTITY_CLIENT_ID"
