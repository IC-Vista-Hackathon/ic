# Public exposure for the nonprod control-plane APIs via the dedicated nonprod
# Gateway (ic-nonprod-gateway, hostname pronto-nonprod.eastus2.cloudapp.azure.com).
# Path scheme mirrors prod exactly (parity for functional tests); isolation comes
# from the separate Gateway/LB, not from different paths.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ic-invoice-api
  labels:
    app: ic-invoice-api
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ic-nonprod-gateway
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /invoices
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - group: ""
          kind: Service
          name: ic-invoice-api
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ic-payment-api
  labels:
    app: ic-payment-api
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ic-nonprod-gateway
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /payments
        - path:
            type: PathPrefix
            value: /purchases
      backendRefs:
        - group: ""
          kind: Service
          name: ic-payment-api
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ic-payer-account-api
  labels:
    app: ic-payer-account-api
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ic-nonprod-gateway
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /payers
      backendRefs:
        - group: ""
          kind: Service
          name: ic-payer-account-api
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ic-biller-experience-api
  labels:
    app: ic-biller-experience-api
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ic-nonprod-gateway
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      # Match production: long-running agent orchestration must not inherit Envoy's
      # 15-second default request timeout.
      timeouts:
        request: "0s"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - group: ""
          kind: Service
          name: ic-biller-experience-api
          port: 8080
---
# Frontends: root redirects to /studio/, and /studio + /pay serve the static SPAs.
# Mirrors prod's biller-experience route so per-PR nonprod previews the full UI.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ic-biller-experience-frontends
  labels:
    app.kubernetes.io/part-of: ic-biller-experience
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ic-nonprod-gateway
      sectionName: http
  rules:
    - matches:
        - path:
            type: Exact
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /studio/
            statusCode: 302
    - matches:
        - path:
            type: PathPrefix
            value: /studio
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - group: ""
          kind: Service
          name: ic-biller-experience-studio
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /pay
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - group: ""
          kind: Service
          name: ic-biller-payments-pwa
          port: 8080
