# Public exposure for the nonprod deterministic backend APIs (Invoice, Payment,
# PayerAccount) via the dedicated nonprod Gateway (ic-nonprod-gateway, hostname
# ic-hack-nonprod.eastus2.cloudapp.azure.com). Path scheme mirrors prod (parity for
# functional tests); isolation comes from the separate Gateway/LB, not the paths.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ic-invoice-api
  labels:
    app: ic-invoice-api
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ic-nonprod-gateway
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /invoices
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - group: ""
          kind: Service
          name: ic-invoice-api
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ic-payment-api
  labels:
    app: ic-payment-api
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ic-nonprod-gateway
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /payments
        - path:
            type: PathPrefix
            value: /purchases
      backendRefs:
        - group: ""
          kind: Service
          name: ic-payment-api
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ic-payer-account-api
  labels:
    app: ic-payer-account-api
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ic-nonprod-gateway
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /payers
      backendRefs:
        - group: ""
          kind: Service
          name: ic-payer-account-api
          port: 8080
