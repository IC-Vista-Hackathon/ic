apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Nonprod environment: an isolated `ic-nonprod` namespace on the same aks-ic-hack
# cluster. Deployed on every PR. Publicly exposed through its OWN kgateway Gateway
# (pronto-nonprod.eastus2.cloudapp.azure.com), separate from prod's LB and
# hostname. Smoke tests still use `kubectl port-forward` (deterministic; doesn't
# wait on LB/DNS provisioning).
namespace: ic-nonprod

resources:
  - namespace.yaml
  - ../../base
  - gateway.yaml
  - httproutes.yaml
  # Static Studio + Payments PWA so per-PR nonprod serves the full UI like prod.
  # No Azure identity needed (static nginx), so — unlike prod's Worker/Cosmos API —
  # these are safe in ic-nonprod. The Worker stays prod-only.
  - frontends.yaml

# Cosmos-backed persistence + workload-identity opt-in for the foundation services, pointed at
# the dedicated nonprod Cosmos account. The dedicated nonprod identity
# (uami-ic-hack-nonprod-workload) is federated to system:serviceaccount:ic-nonprod:ic-workload
# (infra/bicep) and holds data access on nonprod Cosmos only, so these pods authenticate here
# without any path to prod Cosmos.
patches:
  - path: cosmos-persistence.yaml
  # Nonprod-only: point the ic-workload service account at the DEDICATED nonprod workload
  # identity so its pods can reach only the nonprod Cosmos account (data-plane isolation).
  - path: service-account.yaml
  # Nonprod-only: enable the test-data purge endpoint so per-PR functional tests clean up.
  - path: purge-flag.yaml

# `kustomize edit set image <name>=<name>:<sha>` in the deploy workflow pins every
# image to the PR head commit's immutable tag. `latest` here is only a placeholder.
images:
  - name: acrichackjk4zmntatjem4.azurecr.io/ic-biller-experience-api
    newTag: latest
  - name: acrichackjk4zmntatjem4.azurecr.io/ic-biller-experience-studio
    newTag: latest
  - name: acrichackjk4zmntatjem4.azurecr.io/ic-biller-payments-pwa
    newTag: latest
  - name: acrichackjk4zmntatjem4.azurecr.io/ic-invoice-api
    newTag: latest
  - name: acrichackjk4zmntatjem4.azurecr.io/ic-payment-api
    newTag: latest
  - name: acrichackjk4zmntatjem4.azurecr.io/ic-payer-account-api
    newTag: latest
