apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Nonprod environment: an isolated `ic-nonprod` namespace on the same aks-ic-hack
# cluster. Deployed on every PR. Publicly exposed through its OWN kgateway Gateway
# (ic-hack-nonprod.eastus2.cloudapp.azure.com), separate from prod's LB and
# hostname. Smoke tests still use `kubectl port-forward` (deterministic; doesn't
# wait on LB/DNS provisioning).
namespace: ic-nonprod

resources:
  - namespace.yaml
  - ../../base
  - gateway.yaml
  - httproutes.yaml

# Cosmos-backed persistence + workload-identity opt-in for the foundation services, pointed at
# the dedicated nonprod Cosmos account. The workload identity is federated to
# system:serviceaccount:ic-nonprod:ic-workload (infra/bicep), so these pods authenticate here too.
patches:
  - path: cosmos-persistence.yaml

# `kustomize edit set image <name>=<name>:<sha>` in the deploy workflow pins every
# image to the PR head commit's immutable tag. `latest` here is only a placeholder.
images:
  - name: acrichackjk4zmntatjem4.azurecr.io/ic-biller-experience-api
    newTag: latest
  - name: acrichackjk4zmntatjem4.azurecr.io/ic-invoice-api
    newTag: latest
  - name: acrichackjk4zmntatjem4.azurecr.io/ic-payment-api
    newTag: latest
  - name: acrichackjk4zmntatjem4.azurecr.io/ic-payer-account-api
    newTag: latest
