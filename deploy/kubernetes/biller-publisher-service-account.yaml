# Dedicated Azure workload identity for IC.BillerExperience.Worker. It can claim publication
# records in Cosmos and write versioned public-safe artifacts to Blob Storage, but receives no AI
# Foundry access. The client ID below is infra/bicep's publisherIdentityClientId output; update it
# if the identity is recreated.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: biller-publisher
  namespace: ic
  annotations:
    azure.workload.identity/client-id: "ec6aaa8e-1176-475f-8e66-11494a0fe4e0"
  labels:
    azure.workload.identity/use: "true"
