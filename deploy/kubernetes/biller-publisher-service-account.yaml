# Dedicated identity for IC.BillerExperience.Worker's Kubernetes mutations. Kept separate from
# ic-workload (used for Azure workload identity / Cosmos & AI Foundry auth) so the API-serving pod,
# if it ever runs under ic-workload, never inherits k8s-mutation rights it doesn't need.
#
# Lives in the ic namespace (a pod's serviceAccountName must be in its own namespace) but is granted
# permissions only in biller-sites via a cross-namespace RoleBinding subject -- see
# biller-publisher-role.yaml.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: biller-publisher
  namespace: ic
