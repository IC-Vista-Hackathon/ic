# Exposure via the shared ic-gateway (kgateway, Gateway API), same as invoice-api.
# The Payer Account Service's own route IS /payers per design/contracts.md, so the
# prefix routes through with no URLRewrite:
#   POST http://ic-hack.eastus2.cloudapp.azure.com/payers -> /payers at the service
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ic-payer-account-api
  namespace: ic
  labels:
    app: ic-payer-account-api
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ic-gateway
      namespace: kgateway-system
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /payers
      backendRefs:
        - group: ""
          kind: Service
          name: ic-payer-account-api
          port: 8080
